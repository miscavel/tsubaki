<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tsubaki Driller</title>
<script src="data-jlpt.js"></script>
<script src="data-games.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme variables ───────────────────────────────────────── */
:root {
  --bg:          #1a1a2e;
  --surface:     #16213e;
  --surface2:    #0f3460;
  --accent:      #e94560;
  --text:        #eee;
  --text-muted:  #aaa;
  --text-dim:    #666;
  --border:      #0f3460;
  --ok-bg:       #1b5e20;
  --ok-border:   #4caf50;
  --ok-text:     #c8e6c9;
  --err-bg:      #7f0000;
  --err-border:  #e53935;
  --err-text:    #ffcdd2;
}

body.light {
  --bg:         #f2f1ec;
  --surface:    #ffffff;
  --surface2:   #e0dfd8;
  --accent:     #c0392b;
  --text:       #1a1a2e;
  --text-muted: #666;
  --text-dim:   #999;
  --border:     #ccc;
  --ok-bg:      #e8f5e9;
  --ok-border:  #4caf50;
  --ok-text:    #1b5e20;
  --err-bg:     #ffebee;
  --err-border: #e53935;
  --err-text:   #7f0000;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 8px 40px;
  transition: background 0.2s, color 0.2s;
}

#app {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Top bar (app tabs + utility toggles) ──────────────────── */
.top-bar {
  display: flex;
  gap: 6px;
  align-items: center;
}

.app-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border-radius: 10px;
  padding: 4px;
  flex: 1;
}

.app-tab {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s, color 0.15s;
}

.app-tab.active { background: var(--accent); color: #fff; }

.util-btn {
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
  white-space: nowrap;
}

.util-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Controls ──────────────────────────────────────────────── */
.controls {
  background: var(--surface);
  border-radius: 10px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.btn-row.spaced { justify-content: space-between; }

.ctrl-btn {
  padding: 6px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 0.12s;
  white-space: nowrap;
}

.ctrl-btn:hover { border-color: var(--accent); color: var(--text); }
.ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.ctrl-btn.n5.active { background: #2e7d32; border-color: #4caf50; }
.ctrl-btn.n4.active { background: #e65100; border-color: #ff9800; }

.spacer { flex: 1; }

/* ── Card ──────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: 14px;
  padding: 28px 20px 20px;
  min-height: 140px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-align: center;
}

.badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 4px;
}

.badge {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

.badge.n5  { background: #1b5e20; color: #a5d6a7; }
.badge.n4  { background: #e65100; color: #ffe0b2; }
.badge.n3  { background: #b71c1c; color: #ffcdd2; }
.badge.pat { background: #1a237e; color: #c5cae9; font-size: 0.68rem; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge.cat { background: #1a3a4a; color: #b0d4e8; }
.badge.game-lbl { background: #2a1a4a; color: #c9b0e8; }
.badge.prio  { background: transparent; padding: 0; font-size: 0.85rem; }
.badge.retry { background: #4a2800; color: #ffcc80; }

body.light .badge.n5  { background: #c8e6c9; color: #1b5e20; }
body.light .badge.n4  { background: #ffe0b2; color: #e65100; }
body.light .badge.n3  { background: #ffcdd2; color: #b71c1c; }
body.light .badge.pat { background: #c5cae9; color: #1a237e; }
body.light .badge.cat { background: #b0d4e8; color: #1a3a4a; }
body.light .badge.game-lbl { background: #c9b0e8; color: #2a1a4a; }

.word {
  font-size: 2.4rem;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: 0.05em;
}

.reading {
  font-size: 1rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}

.hidden-reading { visibility: hidden; }
ruby.hidden-reading { visibility: visible; }
ruby.hidden-reading rt { visibility: hidden; }
ruby rt { font-size: 0.45em; color: var(--text-muted); letter-spacing: 0.05em; }

.sentence {
  font-size: 1.3rem;
  line-height: 1.6;
  letter-spacing: 0.05em;
  max-width: 420px;
}

.card-error {
  color: var(--accent);
  font-size: 0.9rem;
  padding: 20px;
}
.example-block {
  margin-top: 10px;
  padding: 7px 11px;
  background: var(--surface2);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}
.example-block .ex-lbl { font-size: 0.68rem; color: var(--accent); font-weight: 700; letter-spacing: 0.05em; }
.example-block .ex-s { color: var(--text); font-size: 0.88rem; margin-top: 2px; line-height: 1.5; }
.example-block .ex-r { color: var(--text-muted); font-size: 0.75rem; }

/* ── Choices ───────────────────────────────────────────────── */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.choice {
  padding: 12px 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  font-size: 0.9rem;
  cursor: pointer;
  text-align: left;
  line-height: 1.4;
  transition: border-color 0.1s, background 0.1s;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.choice:hover { border-color: var(--accent); }
.choice.correct { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok-text); }
.choice.wrong   { background: var(--err-bg); border-color: var(--err-border); color: var(--err-text); }

.choice .num {
  font-size: 0.75rem;
  color: var(--text-dim);
  flex-shrink: 0;
  padding-top: 2px;
}

/* ── Feedback ──────────────────────────────────────────────── */
.feedback {
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.9rem;
  line-height: 1.6;
  display: none;
  text-align: center;
}

.feedback.show   { display: block; }
.feedback.correct { background: var(--ok-bg);  color: var(--ok-text); }
.feedback.wrong   { background: var(--err-bg); color: var(--err-text); }
.feedback small { display: block; margin-top: 4px; opacity: 0.8; font-size: 0.82rem; }

/* ── Status bar ────────────────────────────────────────────── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 2px;
  flex-wrap: wrap;
}

#score-display  { font-size: 0.88rem; color: var(--text-muted); }
#streak-display { font-size: 0.88rem; color: #ffd54f; }

.icon-btn {
  padding: 5px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.78rem;
  cursor: pointer;
  transition: border-color 0.1s, color 0.1s;
  white-space: nowrap;
}

.icon-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Save/load area ────────────────────────────────────────── */
#save-area {
  background: var(--surface);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Word-list modal ───────────────────────────────────────── */
#wl-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#wl-backdrop.open { display: flex; }
#wl-modal {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  width: min(480px, 96vw);
  max-height: 82vh;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#wl-modal h3 { font-size: 1rem; color: var(--text); }
#wl-items {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
  min-height: 0;
}
.wl-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  background: var(--surface2);
  border-radius: 8px;
}
.wl-row.wl-known { opacity: 0.45; }
.wl-word { font-weight: 600; font-size: 0.9rem; color: var(--text); flex-shrink: 0; }
.wl-read { color: var(--text-muted); font-size: 0.75rem; flex-shrink: 0; }
.wl-dot { font-size: 0.65rem; flex-shrink: 0; }
.wl-dot.hard { color: #e57373; }
.wl-dot.easy { color: #81c784; }
.wl-mean { flex: 1; color: var(--text-muted); font-size: 0.78rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.wl-btn { flex-shrink: 0; font-size: 0.72rem; padding: 3px 7px; border: 1px solid var(--border); border-radius: 5px; background: transparent; color: var(--text-muted); cursor: pointer; }
.wl-btn:hover { border-color: var(--accent); color: var(--accent); }
.wl-btn.known { background: var(--accent); border-color: var(--accent); color: #fff; }
#wl-search {
  width: 100%; padding: 7px 10px; border-radius: 7px;
  border: 1.5px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 0.85rem; outline: none;
}
#wl-search:focus { border-color: var(--accent); }
#wl-footer { display: flex; align-items: center; gap: 8px; }
#wl-count { flex: 1; font-size: 0.8rem; color: var(--text-muted); }

#save-code {
  width: 100%;
  height: 60px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 0.75rem;
  font-family: monospace;
  padding: 6px;
  resize: none;
}

.load-row { display: flex; gap: 6px; }

#load-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.8rem;
  padding: 6px 8px;
  outline: none;
}

#load-input:focus { border-color: var(--accent); }

#load-btn {
  padding: 6px 12px;
  background: var(--accent);
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
}

@media (max-width: 400px) {
  .word { font-size: 1.9rem; }
  .choices { grid-template-columns: 1fr; }
}

/* ── Reward modal ─────────────────────────────────────────────────────────── */
#reward-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  align-items: center; justify-content: center;
}
#reward-backdrop.open { display: flex; }
#reward-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  max-width: min(420px, 94vw);
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 90vh;
}
#reward-art {
  width: 100%; border-radius: 8px;
  object-fit: contain;
  max-height: 55vh;
  background: var(--surface2);
  display: block;
}
#reward-art.loading { min-height: 160px; }
#reward-header {
  display: flex; align-items: center; gap: 8px;
  font-size: 1rem; font-weight: 700; color: var(--accent);
}
#reward-meta {
  font-size: 0.75rem; color: var(--text-muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#reward-footer { display: flex; gap: 8px; justify-content: flex-end; }
#reward-source-link {
  font-size: 0.8rem; color: var(--accent);
  text-decoration: none; padding: 5px 10px;
  border: 1px solid var(--accent); border-radius: 6px;
  white-space: nowrap;
}
#reward-source-link:hover { background: var(--accent); color: #fff; }
</style>
</head>
<body>
<div id="app">

  <!-- Top bar: app tabs + theme/lang toggles -->
  <div class="top-bar">
    <div class="app-tabs">
      <button class="app-tab active" id="tab-jlpt">JLPT</button>
      <button class="app-tab" id="tab-game">ゲーム</button>
    </div>
    <button class="util-btn" id="reward-toggle-btn" title="アート報酬のオン/オフ">🎨</button>
    <button class="util-btn" id="theme-btn">☀</button>
    <button class="util-btn" id="lang-btn">EN</button>
  </div>

  <!-- JLPT controls -->
  <div class="controls" id="jlpt-controls">
    <div class="btn-row spaced">
      <button class="ctrl-btn lvl-btn n5" data-lv="n5">N5</button>
      <button class="ctrl-btn lvl-btn n4" data-lv="n4">N4</button>
      <button class="ctrl-btn lvl-btn n3 active" data-lv="n3">N3</button>
      <div class="spacer"></div>
      <button class="ctrl-btn" id="prio-btn">⭐ 優先</button>
      <button class="ctrl-btn" id="reading-btn">ふり</button>
    </div>
    <div class="btn-row">
      <button class="ctrl-btn active" id="tab-vocab">語彙</button>
      <button class="ctrl-btn" id="tab-grammar">文法</button>
      <button class="ctrl-btn" id="tab-mix">まぜ</button>
    </div>
  </div>

  <!-- Game controls -->
  <div class="controls" id="game-controls" style="display:none">
    <div class="btn-row" id="game-selector">
      <button class="ctrl-btn active" data-game="pokemon">ポケモン</button>
      <button class="ctrl-btn" data-game="acnh">どうぶつの森</button>
      <button class="ctrl-btn" data-game="dq11">DQ XI</button>
      <button class="ctrl-btn" data-game="hgss">HGSS</button>
      <button class="ctrl-btn" data-game="bw">ぼうけん</button>
      <div class="spacer"></div>
      <button class="ctrl-btn" id="reading-btn-game">ふり</button>
    </div>
    <div class="btn-row" id="cat-btns"></div>
    <div class="btn-row" id="game-mode-btns">
      <button class="ctrl-btn active" data-gm="vocab">漢字→意味</button>
      <button class="ctrl-btn" data-gm="imi">意味→漢字</button>
      <button class="ctrl-btn" data-gm="yomi">読み→漢字</button>
      <button class="ctrl-btn" data-gm="sentence">文章</button>
    </div>
    <div class="btn-row">
      <button class="ctrl-btn" id="word-list-btn" style="font-size:0.8em">単語リスト</button>
      <button class="ctrl-btn" id="sentence-list-btn" style="font-size:0.8em;display:none">文章</button>
    </div>
  </div>

  <!-- Card -->
  <div class="card" id="card"></div>

  <!-- Choices -->
  <div class="choices" id="choices"></div>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="score-display">0 / 0</span>
    <span id="streak-display"></span>
    <span id="reward-counter" style="font-size:0.8rem;opacity:0.7"></span>
    <div class="spacer"></div>
    <button class="icon-btn" id="save-btn">💾 セーブ</button>
    <button class="icon-btn" id="next-btn">→ 次へ</button>
  </div>

  <!-- Save / load -->
  <div id="save-area" style="display:none">
    <div style="display:flex;gap:10px;align-items:flex-start">
      <img id="save-qr" style="width:110px;height:110px;flex-shrink:0;border-radius:6px;border:1px solid var(--border);background:#fff">
      <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:0">
        <textarea id="save-code" readonly style="height:52px"></textarea>
        <button class="ctrl-btn" id="copy-link-btn" style="width:100%">🔗 リンクをコピー</button>
      </div>
    </div>
    <div class="load-row">
      <input id="load-input" type="text" placeholder="セーブコードを貼り付け…">
      <button id="load-btn">読み込む</button>
    </div>
  </div>

</div>

<!-- Reward modal -->
<div id="reward-backdrop">
  <div id="reward-modal">
    <div id="reward-header">🎨 5問正解！お疲れ様！</div>
    <img id="reward-art" class="loading" alt="Loading artwork…">
    <div id="reward-meta"></div>
    <div id="reward-footer">
      <a id="reward-source-link" href="#" target="_blank" rel="noopener">Pixiv で見る →</a>
      <button class="ctrl-btn active" id="reward-close">続ける</button>
    </div>
  </div>
</div>

<!-- Word-list modal (outside #app so position:fixed is unambiguous) -->
<div id="wl-backdrop">
  <div id="wl-modal">
    <div style="display:flex;align-items:center;gap:8px">
      <h3 id="wl-title">単語リスト</h3>
      <div class="spacer"></div>
      <button class="ctrl-btn active" id="wl-close">閉じる</button>
    </div>
    <div class="btn-row" id="wl-filters">
      <button class="ctrl-btn active" data-wlf="all">全部</button>
      <button class="ctrl-btn" data-wlf="active">学習中</button>
      <button class="ctrl-btn" data-wlf="known">習得済み</button>
    </div>
    <input id="wl-search" type="text" placeholder="検索… 漢字・読み・意味" autocomplete="off">
    <div id="wl-items"></div>
    <div id="wl-footer">
      <span id="wl-count"></span>
      <button class="ctrl-btn" id="wl-reset">習得リセット</button>
      <button class="ctrl-btn active" id="wl-close2">閉じる</button>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let appMode = 'jlpt';
let jlptMode = 'vocab';
let activeLevels = new Set(['n3']);
let priorityOnly = false;
let hideReading = false;
let gameId = 'pokemon';
let gameCategory = 'すべて';
let gameMode = 'vocab'; // 'vocab' (kanji→meaning), 'imi' (meaning→kanji), 'yomi' (reading→kanji)
let score = 0, total = 0, streak = 0;
let answered = false;
let current = null;
let recentKeys = [];
let retryQueue = []; // wrong answers come back here
let knownWords = new Set(); // 'gameId:word' keys for mastered vocab
let wordWeights = new Map(); // 'gameId:word' → weight 0.2–3.0, default 1.0
let theme = 'dark';
let uiLang = 'ja';

// ── UI labels ────────────────────────────────────────────────────────────────
const L = {
  ja: {
    tabGame: 'ゲーム', tabVocab: '語彙', tabGrammar: '文法', tabMix: 'まぜ',
    prio: '⭐ 優先', furigana: 'ふり',
    save: '💾 セーブ', next: '→ 次へ',
    load: '読み込む', loadPlaceholder: 'セーブコードを貼り付け…',
    langBtn: 'EN',
    noItems: '項目が少なすぎます。フィルターを変えてください。',
  },
  en: {
    tabGame: 'Game', tabVocab: 'Vocab', tabGrammar: 'Grammar', tabMix: 'Mix',
    prio: '⭐ Priority', furigana: 'Furigana',
    save: '💾 Save', next: '→ Next',
    load: 'Load', loadPlaceholder: 'Paste save code…',
    langBtn: 'JP',
    noItems: 'Not enough items. Change the filters.',
  },
};

// ── Pool helpers ──────────────────────────────────────────────────────────────
function jlptVocabPool() {
  return vocab.filter(v => activeLevels.has(v.lv) && (!priorityOnly || v.p));
}
function jlptGrammarPool() {
  return grammar.filter(g => activeLevels.has(g.lv) && (!priorityOnly || g.pr));
}
function effectiveGid() {
  return (appMode === 'game' && gameMode !== 'vocab') ? `${gameId}_${gameMode}` : gameId;
}
function gamePool() {
  const g = gameData[gameId];
  const base = gameCategory === 'すべて' ? g.vocab : g.vocab.filter(v => v.cat === gameCategory);
  const eid = effectiveGid();
  return base.filter(v => !knownWords.has(`${eid}:${v.w}`));
}
function pickRandom(pool, keyFn) {
  if (!pool.length) return null;
  let item, tries = 0;
  do {
    item = pool[Math.floor(Math.random() * pool.length)];
    tries++;
  } while (recentKeys.includes(keyFn(item)) && tries < 20);
  recentKeys.push(keyFn(item));
  const cap = Math.max(4, Math.floor(pool.length / 2));
  if (recentKeys.length > cap) recentKeys.shift();
  return item;
}

function pickWeightedGame(pool) {
  const available = pool.filter(v => !recentKeys.includes(v.w));
  const src = available.length > 0 ? available : pool;
  const weights = src.map(v => wordWeights.get(`${effectiveGid()}:${v.w}`) ?? 1.0);
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  let chosen = src[src.length - 1];
  for (let i = 0; i < src.length; i++) {
    r -= weights[i];
    if (r <= 0) { chosen = src[i]; break; }
  }
  recentKeys.push(chosen.w);
  const cap = Math.max(4, Math.floor(pool.length / 2));
  if (recentKeys.length > cap) recentKeys.shift();
  return chosen;
}

function wordWithRuby(w, r) {
  return (/[一-鿿]/.test(w) && w !== r) ? `<ruby>${w}<rt>${r}</rt></ruby>` : w;
}

// ── Question generators ───────────────────────────────────────────────────────
function genVocabQuestion() {
  const pool = jlptVocabPool();
  if (pool.length < 4) return null;
  const item = pickRandom(pool, v => v.w);
  const wrong = pool.filter(v => v.w !== item.w)
    .sort(() => Math.random() - 0.5).slice(0, 3).map(v => v.m);
  const choices = [item.m, ...wrong].sort(() => Math.random() - 0.5);
  return { type: 'vocab', word: item.w, reading: item.r, answer: item.m, choices, lv: item.lv, prio: !!item.p };
}
function genGrammarQuestion() {
  const pool = jlptGrammarPool();
  if (pool.length < 4) return null;
  const item = pickRandom(pool, g => g.p);
  const choices = item.c.slice().sort(() => Math.random() - 0.5);
  return { type: 'grammar', sentence: item.s, reading: item.r || '', translation: item.t || '', answer: item.a, choices, pattern: item.p, explanation: item.e || '', lv: item.lv, prio: !!item.pr };
}
function getSentencesForWord(word) {
  const pool = gameData[gameId]?.sentences || [];
  // Strip leading ～ used in suffix notation (e.g. ～合う → 合う)
  const searchWord = word.startsWith('～') ? word.slice(1) : word;
  const exact = pool.filter(s => s.s.includes(searchWord));
  if (exact.length > 0) return exact;
  // Fallback: match on stem (word minus trailing hiragana) if stem is ≥2 chars and contains kanji
  if (/[ぁ-ん]$/.test(searchWord)) {
    const stem = searchWord.slice(0, -1);
    if (stem.length >= 2 && /[一-鿿]/.test(stem)) return pool.filter(s => s.s.includes(stem));
  }
  return [];
}
function getWordsInSentence(sentence) {
  return (gameData[gameId]?.vocab || []).filter(v => sentence.includes(v.w));
}
function genGameQuestion() {
  if (gameMode === 'sentence') {
    const pool = gameData[gameId].sentences;
    if (!pool || pool.length < 4) return null;
    const item = pickRandom(pool, s => s.s);
    const others = pool.filter(s => s.s !== item.s).sort(() => Math.random() - 0.5).slice(0, 3);
    const choices = [item.a, ...others.map(o => o.a)].sort(() => Math.random() - 0.5);
    return { type: 'game-sentence', sentence: item.s, reading: item.r, answer: item.a, choices };
  }
  if (gameCategory === 'セリフ') {
    const pool = gameData[gameId].dialogues;
    if (!pool || pool.length < 4) return null;
    const item = pickRandom(pool, d => d.s);
    const choices = item.c.slice().sort(() => Math.random() - 0.5);
    return { type: 'dialogue', sentence: item.s, reading: item.r || '', speaker: item.sp, answer: item.a, choices, explanation: item.e };
  }
  const pool = gamePool();
  if (pool.length < 2) return null;
  const item = pickWeightedGame(pool);
  const sameCat = gameData[gameId].vocab.filter(v => v.w !== item.w && v.cat === item.cat);
  const wrongSrc = sameCat.length >= 3 ? sameCat : gameData[gameId].vocab.filter(v => v.w !== item.w);
  if (gameMode === 'imi' || gameMode === 'yomi') {
    const distractors = wrongSrc.sort(() => Math.random() - 0.5).slice(0, 3);
    const choices = [...distractors.map(v => v.w), item.w].sort(() => Math.random() - 0.5);
    const imiSents = getSentencesForWord(item.w);
    const rawSent = imiSents.length > 0 ? imiSents[Math.floor(Math.random() * imiSents.length)] : null;
    const exampleSent = rawSent ? {
      ...rawSent,
      masked:  rawSent.s.split(item.w).join('＿＿＿'),
      maskedR: rawSent.r.split(item.r).join('＿＿＿'),
    } : null;
    return {
      type: gameMode === 'imi' ? 'game-imi' : 'game-yomi',
      question: gameMode === 'imi' ? item.m : item.r,
      choices, word: item.w, reading: item.r, answer: item.w, meaning: item.m, cat: item.cat, exampleSent,
    };
  }
  const wrong = wrongSrc.sort(() => Math.random() - 0.5).slice(0, 3).map(v => v.m);
  const choices = [item.m, ...wrong].sort(() => Math.random() - 0.5);
  const wordSents = getSentencesForWord(item.w);
  const exampleSent = wordSents.length > 0
    ? wordSents[Math.floor(Math.random() * wordSents.length)] : null;
  return { type: 'game', word: item.w, reading: item.r, answer: item.m, choices, cat: item.cat, exampleSent };
}
function genQuestion() {
  if (appMode === 'game') return genGameQuestion();
  // 40% chance to retry a wrong item from earlier in the session
  if (retryQueue.length && Math.random() < 0.4) {
    const retry = retryQueue.shift();
    retry.choices = retry.choices.slice().sort(() => Math.random() - 0.5);
    retry._retry = true;
    return retry;
  }
  if (jlptMode === 'mix') {
    return Math.random() < 0.5 ? genVocabQuestion() : genGrammarQuestion();
  }
  return jlptMode === 'vocab' ? genVocabQuestion() : genGrammarQuestion();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = genQuestion();
  const card = document.getElementById('card');
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('choices').innerHTML = '';

  if (!q) {
    card.innerHTML = `<div class="card-error">${L[uiLang].noItems}</div>`;
    current = null;
    return;
  }

  current = q;
  answered = false;

  const prioBadge  = q.prio   ? '<span class="badge prio">⭐</span>'    : '';
  const retryBadge = q._retry ? '<span class="badge retry">↩ retry</span>' : '';
  if (q.type === 'vocab') {
    const rc = hideReading ? 'reading hidden-reading' : 'reading';
    card.innerHTML = `
      <div class="badges"><span class="badge ${q.lv}">${q.lv.toUpperCase()}</span>${prioBadge}${retryBadge}</div>
      <div class="word">${q.word}</div>
      <div class="${rc}" id="reading-display">${q.reading}</div>`;
  } else if (q.type === 'grammar') {
    const rc2 = hideReading ? 'reading hidden-reading' : 'reading';
    card.innerHTML = `
      <div class="badges">
        <span class="badge ${q.lv}">${q.lv.toUpperCase()}</span>
        ${prioBadge}${retryBadge}
        <span class="badge pat">${q.pattern}</span>
      </div>
      <div class="sentence">${q.sentence}</div>
      ${q.reading ? `<div class="${rc2}" id="reading-display">${q.reading}</div>` : ''}`;
  } else if (q.type === 'dialogue') {
    const rcDlg = hideReading ? 'reading hidden-reading' : 'reading';
    card.innerHTML = `
      <div class="badges">
        <span class="badge game-lbl">${gameData[gameId].label}</span>
        <span class="badge cat">${q.speaker}</span>
      </div>
      <div class="sentence">${q.sentence}</div>
      ${q.reading ? `<div class="${rcDlg}" id="reading-display">${q.reading}</div>` : ''}`;
  } else if (q.type === 'game-imi' || q.type === 'game-yomi') {
    const modeLabel = q.type === 'game-imi' ? '意味→漢字' : '読み→漢字';
    const qClass = q.type === 'game-imi' ? 'sentence' : 'word';
    const exHtmlIM = q.exampleSent ? `
      <div class="example-block">
        <div class="ex-lbl">例文</div>
        <div class="ex-s">${q.exampleSent.masked}</div>
        <div class="ex-r ${hideReading ? 'hidden-reading' : ''}">${q.exampleSent.maskedR}</div>
      </div>` : '';
    card.innerHTML = `
      <div class="badges">
        <span class="badge game-lbl">${gameData[gameId].label}</span>
        <span class="badge cat">${modeLabel}</span>
      </div>
      <div class="${qClass}">${q.question}</div>
      ${exHtmlIM}`;
  } else if (q.type === 'game-sentence') {
    const rcSent = hideReading ? 'reading hidden-reading' : 'reading';
    card.innerHTML = `
      <div class="badges">
        <span class="badge game-lbl">${gameData[gameId].label}</span>
        <span class="badge cat">文章</span>
      </div>
      <div class="sentence">${q.sentence}</div>
      <div class="${rcSent}" id="reading-display" style="font-size:0.85rem">${q.reading}</div>`;
  } else {
    const hasKanji = /[一-鿿]/.test(q.word);
    const useRuby = hasKanji && q.word !== q.reading;
    const showFallbackR = !useRuby && q.word !== q.reading;
    const rcGame = hideReading ? 'reading hidden-reading' : 'reading';
    const wordHtml = useRuby
      ? `<ruby id="reading-display"${hideReading ? ' class="hidden-reading"' : ''}>${q.word}<rt>${q.reading}</rt></ruby>`
      : q.word;
    const exHtml = q.exampleSent ? `
      <div class="example-block">
        <div class="ex-lbl">例文</div>
        <div class="ex-s">${q.exampleSent.s}</div>
        <div class="ex-r ${hideReading ? 'hidden-reading' : ''}">${q.exampleSent.r}</div>
      </div>` : '';
    card.innerHTML = `
      <div class="badges">
        <span class="badge game-lbl">${gameData[gameId].label}</span>
        <span class="badge cat">${q.cat}</span>
      </div>
      <div class="word">${wordHtml}</div>
      ${showFallbackR ? `<div class="${rcGame}" id="reading-display">${q.reading}</div>` : ''}
      ${exHtml}`;
  }

  const choicesDiv = document.getElementById('choices');
  choicesDiv.style.gridTemplateColumns = (q.type === 'dialogue' || q.type === 'game-sentence') ? '1fr' : '';
  q.choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.dataset.choice = ch;
    btn.innerHTML = `<span class="num">${i + 1}</span>${ch}`;
    btn.addEventListener('click', () => choose(ch));
    choicesDiv.appendChild(btn);
  });
}

// ── Answer ────────────────────────────────────────────────────────────────────
function choose(choice) {
  if (!current) return;
  if (answered) { renderQuestion(); return; }
  answered = true;
  total++;

  const correct = choice === current.answer;
  if (correct) {
    score++; streak++;
  } else {
    streak = 0;
    // queue wrong item for retry (cap at 8, no duplicates)
    const key = current.word || current.pattern || current.sentence;
    if (key && retryQueue.length < 8 && !retryQueue.some(q => (q.word || q.pattern || q.sentence) === key)) {
      retryQueue.push({...current});
    }
  }

  if (hideReading) {
    document.querySelectorAll('.hidden-reading').forEach(el => el.classList.remove('hidden-reading'));
  }

  document.querySelectorAll('.choice').forEach(btn => {
    if (btn.dataset.choice === current.answer) btn.classList.add('correct');
    else if (btn.dataset.choice === choice && !correct) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  if (current.type === 'vocab') {
    const detail = `${current.word}【${current.reading}】= ${current.answer}`;
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    const sentFb = current.exampleSent ? `<br><small style="opacity:0.7">${current.exampleSent.a}</small>` : '';
    fb.innerHTML = `${correct ? '✓ Correct! ' : '✗ Wrong. '}${detail}${sentFb}`;
  } else if (current.type === 'grammar') {
    const filled = current.sentence.replace('（　）', `「${current.answer}」`);
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Wrong.'}<br>${filled}<br><small>${current.explanation}</small>${current.translation ? `<br><small style="opacity:0.7">${current.translation}</small>` : ''}`;
  } else if (current.type === 'dialogue') {
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Wrong.'}<br><small>${current.answer}</small><br><small style="opacity:0.7">${current.explanation}</small>`;
  } else if (current.type === 'game-sentence') {
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    const assocWords = getWordsInSentence(current.sentence);
    const eids = [gameId, `${gameId}_imi`, `${gameId}_yomi`];
    const wordBtns = assocWords.map(v => {
      const known = eids.some(eid => knownWords.has(`${eid}:${v.w}`));
      return `<button class="ctrl-btn sent-word-btn${known ? ' active' : ''}" data-word="${v.w}" style="font-size:0.75em;padding:3px 7px">${v.w}${known ? ' ✓' : ''}</button>`;
    }).join('');
    const wordsRow = assocWords.length ? `<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;align-items:center"><span style="font-size:0.72rem;color:var(--text-muted)">習得:</span>${wordBtns}</div>` : '';
    fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Wrong.'}<br><small>${current.answer}</small><br><small style="opacity:0.7">${current.reading}</small>${wordsRow}`;
    fb.querySelectorAll('.sent-word-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const w = btn.dataset.word;
        const anyKnown = eids.some(eid => knownWords.has(`${eid}:${w}`));
        eids.forEach(eid => {
          const k = `${eid}:${w}`;
          if (anyKnown) knownWords.delete(k); else knownWords.add(k);
        });
        const nowKnown = eids.some(eid => knownWords.has(`${eid}:${w}`));
        btn.textContent = w + (nowKnown ? ' ✓' : '');
        btn.classList.toggle('active', nowKnown);
        saveProgress(); syncUI();
      });
    });
  } else {
    // handles 'game', 'game-imi', 'game-yomi'
    const eid = effectiveGid();
    const key = `${eid}:${current.word}`;
    const w = wordWeights.get(key) ?? 1.0;
    wordWeights.set(key, correct ? Math.max(0.2, w * 0.75) : Math.min(3.0, w * 1.5));
    let detail;
    if (current.type === 'game') {
      detail = `${current.word} = ${current.answer}`;
    } else {
      // imi/yomi: reveal furigana on the correct choice button, show ruby in feedback
      document.querySelectorAll('.choice').forEach(btn => {
        if (btn.dataset.choice === current.answer)
          btn.innerHTML = `<span class="num">✓</span>${wordWithRuby(current.word, current.reading)}`;
      });
      detail = `${wordWithRuby(current.word, current.reading)} = ${current.meaning}`;
    }
    const isKnown = knownWords.has(key);
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    const exFb = current.exampleSent ? `<br><small style="opacity:0.7">${current.exampleSent.a}</small>` : '';
    fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Wrong.'} ${detail}${exFb}<br><button class="ctrl-btn" id="mastered-btn" style="margin-top:6px;font-size:0.8em">${isKnown ? '✓ 習得済み（取消）' : '習得'}</button>`;
    document.getElementById('mastered-btn').addEventListener('click', () => {
      if (knownWords.has(key)) { knownWords.delete(key); } else { knownWords.add(key); }
      const btn = document.getElementById('mastered-btn');
      if (btn) btn.textContent = knownWords.has(key) ? '✓ 習得済み（取消）' : '習得';
      syncUI(); saveProgress();
    });
  }

  updateScore();
  saveProgress();

  if (correct && rewardEnabled) {
    rewardCorrectCount++;
    updateScore();
    if (rewardCorrectCount >= REWARD_THRESHOLD) {
      rewardCorrectCount = 0;
      updateScore();
      setTimeout(showReward, 400);
    }
  }
}

async function showReward() {
  const backdrop = document.getElementById('reward-backdrop');
  const img = document.getElementById('reward-art');
  const meta = document.getElementById('reward-meta');
  const link = document.getElementById('reward-source-link');

  img.src = '';
  img.className = 'loading';
  img.alt = '読み込み中…';
  meta.textContent = '';
  link.href = 'https://www.pixiv.net/tags/ポケモン/artworks?order=popular_d';
  link.textContent = 'Pixiv で見る →';
  backdrop.classList.add('open');

  // Gelbooru via corsproxy.io — bypasses CORS for local file:// origins
  const tags = 'pokemon rating:safe -comic -monochrome -text_focus';
  const page = Math.floor(Math.random() * 15) + 1;

  try {
    const gbApiUrl = `https://gelbooru.com/index.php?page=dapi&s=post&q=index&json=1&limit=30&tags=${encodeURIComponent(tags)}&pid=${page}`;
    const r = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(gbApiUrl)}`);
    const data = await r.json();
    const posts = Array.isArray(data) ? data : (data?.post ?? []);
    const valid = posts.filter(p => p.file_url && /\.(jpg|jpeg|png|webp)$/i.test(p.file_url));
    const post = valid.length ? valid[Math.floor(Math.random() * valid.length)] : null;
    if (post) {
      img.src = post.file_url;
      img.className = '';
      img.alt = 'Artwork';
      const srcUrl = post.source || '';
      const pxMatch = srcUrl.match(/pixiv\.net\/(?:artworks\/|.*?illust_id=)(\d{6,})/);
      if (pxMatch) {
        link.href = `https://www.pixiv.net/artworks/${pxMatch[1]}`;
        link.textContent = 'Pixiv で見る →';
      } else if (srcUrl.startsWith('http')) {
        link.href = srcUrl;
        link.textContent = 'ソースを見る →';
      } else {
        link.href = `https://gelbooru.com/index.php?page=post&s=view&id=${post.id}`;
        link.textContent = 'Gelbooru で見る →';
      }
      const tagPeek = (post.tags || '').split(' ').filter(t => !t.match(/^(rating|score|user|md5|source|id):/)).slice(0, 5).join(' · ');
      meta.textContent = tagPeek;
      return;
    }
  } catch (_) { /* fall through to Danbooru */ }

  // Danbooru fallback (has real CORS headers)
  try {
    const dbUrl = `https://danbooru.donmai.us/posts.json?tags=${encodeURIComponent('pokemon rating:g -comic -monochrome')}&limit=20&page=${page}`;
    const r = await fetch(dbUrl);
    const posts = await r.json();
    const valid = Array.isArray(posts) ? posts.filter(p => p.large_file_url || p.file_url) : [];
    const post = valid.length ? valid[Math.floor(Math.random() * valid.length)] : null;
    if (post) {
      img.src = post.large_file_url || post.file_url;
      img.className = '';
      img.alt = 'Artwork';
      if (post.pixiv_id) {
        link.href = `https://www.pixiv.net/artworks/${post.pixiv_id}`;
        link.textContent = 'Pixiv で見る →';
      } else {
        link.href = `https://danbooru.donmai.us/posts/${post.id}`;
        link.textContent = 'Danbooru で見る →';
      }
      meta.textContent = [post.tag_string_copyright, post.tag_string_character].filter(Boolean).join(' · ');
      return;
    }
  } catch (_) { /* fall through */ }

  img.alt = 'アートを読み込めませんでした';
  img.className = '';
  meta.textContent = 'ネット接続を確認してください';
}

// ── UI sync ───────────────────────────────────────────────────────────────────
function syncUI() {
  document.getElementById('tab-jlpt').classList.toggle('active', appMode === 'jlpt');
  document.getElementById('tab-game').classList.toggle('active', appMode === 'game');
  document.getElementById('jlpt-controls').style.display = appMode === 'jlpt' ? '' : 'none';
  document.getElementById('game-controls').style.display  = appMode === 'game'  ? '' : 'none';

  document.querySelectorAll('.lvl-btn').forEach(b =>
    b.classList.toggle('active', activeLevels.has(b.dataset.lv)));
  document.getElementById('tab-vocab').classList.toggle('active', jlptMode === 'vocab');
  document.getElementById('tab-grammar').classList.toggle('active', jlptMode === 'grammar');
  document.getElementById('tab-mix').classList.toggle('active', jlptMode === 'mix');
  document.getElementById('prio-btn').classList.toggle('active', priorityOnly);
  document.getElementById('reading-btn').classList.toggle('active', hideReading);
  document.getElementById('reading-btn-game').classList.toggle('active', hideReading);

  document.querySelectorAll('#game-selector .ctrl-btn[data-game]').forEach(b =>
    b.classList.toggle('active', b.dataset.game === gameId));
  document.querySelectorAll('[data-gm]').forEach(b =>
    b.classList.toggle('active', b.dataset.gm === gameMode));
  renderCatButtons();
  const _gTotal = (gameData[gameId]?.vocab || []).length;
  const _eid = effectiveGid();
  const _gKnown = gameMode === 'sentence' ? 0 : [...knownWords].filter(k => k.startsWith(`${_eid}:`)).length;
  document.getElementById('word-list-btn').textContent = gameMode === 'sentence'
    ? `単語リスト (${_gTotal})`
    : `単語リスト (${_gTotal - _gKnown}/${_gTotal})`;
  const _sentences = gameData[gameId]?.sentences || [];
  const sentBtn = document.getElementById('sentence-list-btn');
  sentBtn.style.display = (_sentences.length > 0 && gameMode === 'sentence') ? '' : 'none';
  sentBtn.textContent = `文章 (${_sentences.length})`;
}

function renderCatButtons() {
  const container = document.getElementById('cat-btns');
  container.innerHTML = '';
  if (gameMode === 'sentence') return;
  gameData[gameId].cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn' + (cat === gameCategory ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      gameCategory = cat; recentKeys = []; renderCatButtons(); renderQuestion();
    });
    container.appendChild(btn);
  });
}

function updateScore() {
  document.getElementById('score-display').textContent = `${score} / ${total}`;
  document.getElementById('streak-display').textContent = streak >= 3 ? `🔥 ${streak}` : '';
  const rc = document.getElementById('reward-counter');
  rc.textContent = rewardEnabled ? `🎨 ${rewardCorrectCount}/${REWARD_THRESHOLD}` : '';
}

function syncRewardUI() {
  const btn = document.getElementById('reward-toggle-btn');
  btn.style.opacity = rewardEnabled ? '1' : '0.35';

}

// ── Persistence ───────────────────────────────────────────────────────────────
function toB64(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/gi, (_, h) => String.fromCharCode(parseInt(h, 16))))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
function fromB64(b64) {
  const std = b64.replace(/-/g, '+').replace(/_/g, '/');
  const padded = std + '='.repeat((4 - std.length % 4) % 4);
  return decodeURIComponent(atob(padded).split('').map(c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0')).join(''));
}
function encodeState() {
  // v4: category-relative indices — adding words in one category never shifts indices in another
  const kwG = {}, wwG = {};
  const eids = new Set();
  for (const k of knownWords) eids.add(k.slice(0, k.indexOf(':')));
  for (const k of wordWeights.keys()) eids.add(k.slice(0, k.indexOf(':')));
  for (const eid of eids) {
    const baseGid = eid.replace(/_imi$|_yomi$/, '');
    const vocabArr = gameData[baseGid]?.vocab || [];
    const wordCat = new Map(vocabArr.map(v => [v.w, v.cat]));
    const catIdxMap = {}; // cat → Map(word → cat-relative-idx)
    for (const v of vocabArr) {
      if (!catIdxMap[v.cat]) catIdxMap[v.cat] = new Map();
      const m = catIdxMap[v.cat]; m.set(v.w, m.size);
    }
    const kwCats = {};
    for (const key of knownWords) {
      if (!key.startsWith(`${eid}:`)) continue;
      const w = key.slice(eid.length + 1);
      const cat = wordCat.get(w); if (!cat) continue;
      const idx = catIdxMap[cat]?.get(w); if (idx === undefined) continue;
      (kwCats[cat] = kwCats[cat] || []).push(idx);
    }
    if (Object.keys(kwCats).length) {
      for (const arr of Object.values(kwCats)) arr.sort((a, b) => a - b);
      kwG[eid] = kwCats;
    }
    const wwCats = {};
    for (const [key, weight] of wordWeights) {
      if (!key.startsWith(`${eid}:`) || knownWords.has(key)) continue;
      const w = key.slice(eid.length + 1);
      const cat = wordCat.get(w); if (!cat) continue;
      const idx = catIdxMap[cat]?.get(w); if (idx === undefined) continue;
      (wwCats[cat] = wwCats[cat] || []).push([idx, Math.round(weight * 10)]);
    }
    if (Object.keys(wwCats).length) wwG[eid] = wwCats;
  }
  return toB64(JSON.stringify({
    s: score, t: total, x: streak,
    am: appMode, jm: jlptMode,
    lv: [...activeLevels],
    p: priorityOnly ? 1 : 0,
    hr: hideReading ? 1 : 0,
    gi: gameId, gc: gameCategory,
    gm: gameMode,
    kw: kwG, ww: wwG, v: 4,
  }));
}
function _buildCatWordArrays(vocabArr) {
  const m = {};
  for (const v of vocabArr) (m[v.cat] = m[v.cat] || []).push(v.w);
  return m;
}
function applyState(st) {
  score = st.s || 0; total = st.t || 0; streak = st.x || 0;
  appMode  = st.am || 'jlpt';
  jlptMode = st.jm || st.m || 'vocab';
  activeLevels = new Set(st.lv || ['n3']);
  priorityOnly = !!st.p; hideReading = !!st.hr;
  gameId = st.gi || 'pokemon';
  gameCategory = st.gc || 'すべて';
  gameMode = st.gm || 'vocab';
  if (st.v === 4) {
    knownWords = new Set(); wordWeights = new Map();
    for (const [eid, kwCats] of Object.entries(st.kw || {})) {
      const cwa = _buildCatWordArrays(gameData[eid.replace(/_imi$|_yomi$/, '')]?.vocab || []);
      for (const [cat, idxArr] of Object.entries(kwCats))
        for (const idx of idxArr) { const w = cwa[cat]?.[idx]; if (w) knownWords.add(`${eid}:${w}`); }
    }
    for (const [eid, wwCats] of Object.entries(st.ww || {})) {
      const cwa = _buildCatWordArrays(gameData[eid.replace(/_imi$|_yomi$/, '')]?.vocab || []);
      for (const [cat, pairs] of Object.entries(wwCats))
        for (const [idx, iw] of pairs) { const w = cwa[cat]?.[idx]; if (w) wordWeights.set(`${eid}:${w}`, iw / 10); }
    }
  } else if (st.v === 3) {
    // v3 used absolute indices — kept for backward compat but fragile (see v4)
    knownWords = new Set(); wordWeights = new Map();
    for (const [eid, idxArr] of Object.entries(st.kw || {})) {
      const va = gameData[eid.replace(/_imi$|_yomi$/, '')]?.vocab || [];
      for (const idx of idxArr) { if (va[idx]) knownWords.add(`${eid}:${va[idx].w}`); }
    }
    for (const [eid, pairs] of Object.entries(st.ww || {})) {
      const va = gameData[eid.replace(/_imi$|_yomi$/, '')]?.vocab || [];
      for (const [idx, iw] of pairs) { if (va[idx]) wordWeights.set(`${eid}:${va[idx].w}`, iw / 10); }
    }
  } else if (st.v === 2) {
    knownWords = new Set();
    for (const [gid, words] of Object.entries(st.kw || {}))
      words.forEach(w => knownWords.add(`${gid}:${w}`));
    wordWeights = new Map();
    for (const [gid, entries] of Object.entries(st.ww || {}))
      for (const [w, iw] of Object.entries(entries))
        wordWeights.set(`${gid}:${w}`, iw / 10);
  } else {
    knownWords = new Set(st.kw || []);
    wordWeights = new Map(st.ww || []);
  }
  syncUI(); updateScore();
}
function saveProgress() {
  try { localStorage.setItem('tsubaki_driller', encodeState()); } catch(e) {}
}
function loadProgress() {
  try {
    const raw = localStorage.getItem('tsubaki_driller') || localStorage.getItem('tsubaki_progress');
    if (raw) applyState(JSON.parse(fromB64(raw)));
  } catch(e) {}
}

// ── Word-list modal ───────────────────────────────────────────────────────────
let wlFilter = 'all';
let wlSearch = '';
let wlListMode = 'vocab'; // 'vocab' | 'sentence'
let rewardCorrectCount = 0;
const REWARD_THRESHOLD = 5;
let rewardEnabled = false;
function weightDot(key) {
  const w = wordWeights.get(key);
  if (!w || (w >= 0.7 && w <= 1.3)) return '';
  if (w > 1.3) return `<span class="wl-dot hard" title="weight ${w.toFixed(2)}">▲</span>`;
  return `<span class="wl-dot easy" title="weight ${w.toFixed(2)}">▼</span>`;
}
function renderWordList() {
  const items = document.getElementById('wl-items');
  items.innerHTML = '';
  const q = wlSearch.trim().toLowerCase();
  const filtersEl = document.getElementById('wl-filters');
  const resetEl = document.getElementById('wl-reset');

  if (wlListMode === 'sentence') {
    filtersEl.style.display = 'none';
    resetEl.style.display = 'none';
    const pool = gameData[gameId].sentences || [];
    const filtered = q ? pool.filter(s => s.s.includes(q) || s.r.includes(q) || s.a.toLowerCase().includes(q)) : pool;
    document.getElementById('wl-title').textContent = `文章リスト — ${gameData[gameId].label}`;
    document.getElementById('wl-count').textContent = `${pool.length} 文章`;
    if (filtered.length === 0) {
      items.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;padding:8px 0">なし</div>';
    } else {
      filtered.forEach(s => {
        const row = document.createElement('div');
        row.className = 'wl-row';
        row.style.cssText = 'flex-direction:column;align-items:flex-start;gap:2px';
        row.innerHTML = `<span style="font-weight:600;font-size:0.88rem">${s.s}</span><span style="color:var(--text-muted);font-size:0.75rem">${s.r}</span><span style="color:var(--text-muted);font-size:0.78rem">${s.a}</span>`;
        items.appendChild(row);
      });
    }
    return;
  }

  // vocab list
  const sentMode = gameMode === 'sentence';
  const allEids = [gameId, `${gameId}_imi`, `${gameId}_yomi`];
  filtersEl.style.display = '';
  resetEl.style.display = sentMode ? 'none' : '';
  const eid = effectiveGid();
  const allVocab = gameData[gameId].vocab;
  const filtered = allVocab.filter(v => {
    const known = sentMode
      ? allEids.some(e => knownWords.has(`${e}:${v.w}`))
      : knownWords.has(`${eid}:${v.w}`);
    if (wlFilter === 'known' && !known) return false;
    if (wlFilter === 'active' && known) return false;
    if (q) return v.w.includes(q) || v.r.includes(q) || v.m.toLowerCase().includes(q);
    return true;
  });
  if (filtered.length === 0) {
    items.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;padding:8px 0">なし</div>';
  } else {
    filtered.forEach(v => {
      const key = `${eid}:${v.w}`;
      const known = sentMode
        ? allEids.some(e => knownWords.has(`${e}:${v.w}`))
        : knownWords.has(key);
      const row = document.createElement('div');
      row.className = 'wl-row' + (known ? ' wl-known' : '');
      const readingPart = v.w !== v.r ? `<span class="wl-read">${v.r}</span>` : '';
      if (sentMode) {
        row.innerHTML = `<span class="wl-word">${v.w}</span>${readingPart}<span class="wl-mean">${v.m}</span><button class="wl-btn${known ? ' known' : ''}">${known ? '習得済み' : '習得'}</button>`;
        row.querySelector('.wl-btn').addEventListener('click', () => {
          const anyKnown = allEids.some(e => knownWords.has(`${e}:${v.w}`));
          allEids.forEach(e => {
            const k = `${e}:${v.w}`;
            if (anyKnown) knownWords.delete(k); else knownWords.add(k);
          });
          saveProgress(); syncUI(); renderWordList();
        });
      } else {
        row.innerHTML = `<span class="wl-word">${v.w}</span>${readingPart}${weightDot(key)}<span class="wl-mean">${v.m}</span><button class="wl-btn${known ? ' known' : ''}">${known ? '習得済み' : '習得'}</button>`;
        row.querySelector('.wl-btn').addEventListener('click', () => {
          if (knownWords.has(key)) { knownWords.delete(key); } else { knownWords.add(key); }
          saveProgress(); syncUI(); renderWordList();
        });
      }
      items.appendChild(row);
    });
  }
  const total = allVocab.length;
  if (sentMode) {
    const knownCount = allVocab.filter(v => allEids.some(e => knownWords.has(`${e}:${v.w}`))).length;
    document.getElementById('wl-count').textContent = `学習中 ${total - knownCount} / 習得済み ${knownCount}`;
    document.getElementById('wl-title').textContent = `単語リスト — ${gameData[gameId].label} (全モード)`;
  } else {
    const knownCount = [...knownWords].filter(k => k.startsWith(`${eid}:`)).length;
    document.getElementById('wl-count').textContent = `学習中 ${total - knownCount} / 習得済み ${knownCount}`;
    const modeName = gameMode === 'imi' ? '意味→漢字' : gameMode === 'yomi' ? '読み→漢字' : '漢字→意味';
    document.getElementById('wl-title').textContent = `単語リスト — ${gameData[gameId].label} (${modeName})`;
  }
}
function openWordListModal() {
  wlListMode = 'vocab';
  wlSearch = '';
  document.getElementById('wl-search').value = '';
  renderWordList();
  document.getElementById('wl-backdrop').classList.add('open');
  document.getElementById('wl-search').focus();
}

  wlListMode = 'sentence';
  wlSearch = '';
  document.getElementById('wl-search').value = '';
  renderWordList();
  document.getElementById('wl-backdrop').classList.add('open');
  document.getElementById('wl-search').focus();
}

}

  const eid = effectiveGid();

});

  if (e.target === document.getElementById('reward-backdrop'))
    document.getElementById('reward-backdrop').classList.remove('open');
});
document.getElementById('reward-toggle-btn').addEventListener('click', () => {
  rewardEnabled = !rewardEnabled;
  if (!rewardEnabled) rewardCorrectCount = 0;
  try { localStorage.setItem('tsubaki_reward', rewardEnabled ? '1' : '0'); } catch(e) {}
  syncRewardUI();
});

document.getElementById('theme-btn').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
});
document.getElementById('lang-btn').addEventListener('click', () => {
  uiLang = uiLang === 'ja' ? 'en' : 'ja';
  applyUiLang();
});

document.getElementById('save-btn').addEventListener('click', () => {
  const area = document.getElementById('save-area');
  const showing = area.style.display !== 'none';
  area.style.display = showing ? 'none' : '';
  if (!showing) {
    const code = encodeState();
    const ta = document.getElementById('save-code');
    ta.value = code;
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    const shareUrl = location.origin + location.pathname + '?s=' + encodeURIComponent(code);
    document.getElementById('save-qr').src =
      `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(shareUrl)}&size=110x110&margin=4`;
    document.getElementById('copy-link-btn').onclick = () =>
      navigator.clipboard.writeText(shareUrl).catch(() => {});
  }
});
document.getElementById('load-btn').addEventListener('click', () => {
  const raw = document.getElementById('load-input').value.trim();
  if (!raw) return;
  try {
    applyState(JSON.parse(fromB64(raw)));
    recentKeys = [];
    document.getElementById('save-area').style.display = 'none';
    document.getElementById('load-input').value = '';
    renderQuestion();
  } catch(e) { alert(uiLang === 'ja' ? 'コードが無効です' : 'Invalid save code'); }
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (answered || !current) {
    if (e.key === ' ' || e.key === 'Enter' || (e.key >= '1' && e.key <= '4')) {
      e.preventDefault(); renderQuestion();
    }
    return;
  }
  const n = parseInt(e.key);
  if (n >= 1 && n <= 4) {
    const btns = document.querySelectorAll('.choice');
    if (btns[n - 1]) btns[n - 1].click();
  }
});

try { theme  = localStorage.getItem('tsubaki_theme') || 'dark'; } catch(e) {}
try { uiLang = localStorage.getItem('tsubaki_lang')  || 'ja';   } catch(e) {}
try { rewardEnabled = localStorage.getItem('tsubaki_reward') === '1'; } catch(e) {}

syncRewardUI();

if (_urlS) {
  try {
    applyState(JSON.parse(fromB64(_urlS)));
    saveProgress();
    history.replaceState(null, '', location.pathname);

}
