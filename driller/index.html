<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tsubaki Driller</title>
<script src="data-jlpt.js"></script>
<script src="data-games.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  color: #eee;
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 8px 40px;
}

#app {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── App-mode tabs ─────────────────────────────────────────── */
.app-tabs {
  display: flex;
  gap: 4px;
  background: #0f3460;
  border-radius: 10px;
  padding: 4px;
}

.app-tab {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: #aaa;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s, color 0.15s;
}

.app-tab.active {
  background: #e94560;
  color: #fff;
}

/* ── Controls ──────────────────────────────────────────────── */
.controls {
  background: #16213e;
  border-radius: 10px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.btn-row.right {
  justify-content: space-between;
}

/* Level / mode / priority buttons */
.ctrl-btn {
  padding: 6px 12px;
  border: 1.5px solid #0f3460;
  border-radius: 6px;
  background: #0f3460;
  color: #aaa;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 0.12s;
  white-space: nowrap;
}

.ctrl-btn:hover { border-color: #e94560; color: #eee; }
.ctrl-btn.active { background: #e94560; border-color: #e94560; color: #fff; }

.ctrl-btn.n5 { --accent: #4caf50; }
.ctrl-btn.n4 { --accent: #ff9800; }
.ctrl-btn.n3 { --accent: #e94560; }
.ctrl-btn.lvl-btn.active { background: var(--accent, #e94560); border-color: var(--accent, #e94560); }

.spacer { flex: 1; }

/* ── Card ──────────────────────────────────────────────────── */
.card {
  background: #16213e;
  border-radius: 14px;
  padding: 28px 20px 20px;
  min-height: 140px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-align: center;
  position: relative;
}

.badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 4px;
}

.badge {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

.badge.n5 { background: #1b5e20; color: #a5d6a7; }
.badge.n4 { background: #e65100; color: #ffe0b2; }
.badge.n3 { background: #b71c1c; color: #ffcdd2; }
.badge.pat { background: #1a237e; color: #c5cae9; font-size: 0.68rem; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge.cat { background: #1a3a4a; color: #b0d4e8; }
.badge.game { background: #2a1a4a; color: #c9b0e8; }

.word {
  font-size: 2.4rem;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: 0.05em;
}

.reading {
  font-size: 1rem;
  color: #aaa;
  letter-spacing: 0.08em;
}

.hidden-reading { visibility: hidden; }

.sentence {
  font-size: 1.3rem;
  line-height: 1.6;
  letter-spacing: 0.05em;
  max-width: 420px;
}

.card-error {
  color: #e94560;
  font-size: 0.9rem;
  padding: 20px;
}

/* ── Choices ───────────────────────────────────────────────── */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.choice {
  padding: 12px 10px;
  border: 1.5px solid #0f3460;
  border-radius: 10px;
  background: #16213e;
  color: #eee;
  font-size: 0.9rem;
  cursor: pointer;
  text-align: left;
  line-height: 1.4;
  transition: border-color 0.1s, background 0.1s;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.choice:hover { border-color: #e94560; }
.choice.correct { background: #1b5e20; border-color: #4caf50; color: #fff; }
.choice.wrong   { background: #7f0000; border-color: #e53935; color: #fff; }

.choice .num {
  font-size: 0.75rem;
  color: #666;
  flex-shrink: 0;
  padding-top: 2px;
}

/* ── Feedback ──────────────────────────────────────────────── */
.feedback {
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.9rem;
  line-height: 1.6;
  display: none;
  text-align: center;
}

.feedback.show { display: block; }
.feedback.correct { background: #1b5e20; color: #c8e6c9; }
.feedback.wrong   { background: #7f0000; color: #ffcdd2; }

.feedback small { display: block; margin-top: 4px; color: rgba(255,255,255,0.7); font-size: 0.82rem; }

/* ── Status bar ────────────────────────────────────────────── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 4px;
}

#score-display { font-size: 0.9rem; color: #aaa; }
#streak-display { font-size: 0.9rem; color: #ffd54f; }

.status-bar .spacer { flex: 1; }

.icon-btn {
  padding: 5px 10px;
  border: 1.5px solid #333;
  border-radius: 6px;
  background: transparent;
  color: #aaa;
  font-size: 0.78rem;
  cursor: pointer;
  transition: border-color 0.1s, color 0.1s;
}

.icon-btn:hover { border-color: #e94560; color: #eee; }

/* ── Save/load area ────────────────────────────────────────── */
#save-area {
  background: #16213e;
  border-radius: 10px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#save-code {
  width: 100%;
  height: 60px;
  background: #0f1e38;
  border: 1px solid #333;
  border-radius: 6px;
  color: #ccc;
  font-size: 0.75rem;
  font-family: monospace;
  padding: 6px;
  resize: none;
}

.load-row {
  display: flex;
  gap: 6px;
}

#load-input {
  flex: 1;
  background: #0f1e38;
  border: 1px solid #333;
  border-radius: 6px;
  color: #eee;
  font-size: 0.8rem;
  padding: 6px 8px;
  outline: none;
}

#load-input:focus { border-color: #e94560; }

#load-btn {
  padding: 6px 12px;
  background: #e94560;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
}

@media (max-width: 400px) {
  .word { font-size: 1.9rem; }
  .choices { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="app">

  <!-- App mode tabs -->
  <div class="app-tabs">
    <button class="app-tab active" id="tab-jlpt">JLPT</button>
    <button class="app-tab" id="tab-game">ゲーム</button>
  </div>

  <!-- JLPT controls -->
  <div class="controls" id="jlpt-controls">
    <div class="btn-row right">
      <button class="ctrl-btn lvl-btn n5" data-lv="n5">N5</button>
      <button class="ctrl-btn lvl-btn n4" data-lv="n4">N4</button>
      <button class="ctrl-btn lvl-btn n3 active" data-lv="n3">N3</button>
      <div class="spacer"></div>
      <button class="ctrl-btn" id="prio-btn">⭐ 優先</button>
      <button class="ctrl-btn" id="reading-btn">ふり</button>
    </div>
    <div class="btn-row">
      <button class="ctrl-btn active" id="tab-vocab">語彙</button>
      <button class="ctrl-btn" id="tab-grammar">文法</button>
    </div>
  </div>

  <!-- Game controls -->
  <div class="controls" id="game-controls" style="display:none">
    <div class="btn-row" id="game-selector">
      <button class="ctrl-btn active" data-game="pokemon">ポケモン</button>
      <button class="ctrl-btn" data-game="acnh">どうぶつの森</button>
      <button class="ctrl-btn" data-game="dq11">DQ XI</button>
    </div>
    <div class="btn-row" id="cat-btns"></div>
  </div>

  <!-- Card -->
  <div class="card" id="card"></div>

  <!-- Choices -->
  <div class="choices" id="choices"></div>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="score-display">0 / 0</span>
    <span id="streak-display"></span>
    <div class="spacer"></div>
    <button class="icon-btn" id="save-btn">💾 セーブ</button>
    <button class="icon-btn" id="next-btn">→ 次へ</button>
  </div>

  <!-- Save / load -->
  <div id="save-area" style="display:none">
    <textarea id="save-code" readonly></textarea>
    <div class="load-row">
      <input id="load-input" type="text" placeholder="セーブコードを貼り付け…">
      <button id="load-btn">読み込む</button>
    </div>
  </div>

</div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let appMode = 'jlpt';   // 'jlpt' | 'game'
let jlptMode = 'vocab'; // 'vocab' | 'grammar'
let activeLevels = new Set(['n3']);
let priorityOnly = false;
let hideReading = false;
let gameId = 'pokemon';
let gameCategory = 'すべて';
let score = 0, total = 0, streak = 0;
let answered = false;
let current = null;
let recentKeys = [];

// ── Pool helpers ─────────────────────────────────────────────────────────────
function jlptVocabPool() {
  return vocab.filter(v => activeLevels.has(v.lv) && (!priorityOnly || v.p));
}

function jlptGrammarPool() {
  return grammar.filter(g => activeLevels.has(g.lv) && (!priorityOnly || g.pr));
}

function gamePool() {
  const g = gameData[gameId];
  return gameCategory === 'すべて' ? g.vocab : g.vocab.filter(v => v.cat === gameCategory);
}

function pickRandom(pool, keyFn) {
  if (!pool.length) return null;
  let item, tries = 0;
  do {
    item = pool[Math.floor(Math.random() * pool.length)];
    tries++;
  } while (recentKeys.includes(keyFn(item)) && tries < 20);
  recentKeys.push(keyFn(item));
  const cap = Math.max(4, Math.floor(pool.length / 2));
  if (recentKeys.length > cap) recentKeys.shift();
  return item;
}

// ── Question generators ──────────────────────────────────────────────────────
function genVocabQuestion() {
  const pool = jlptVocabPool();
  if (pool.length < 4) return null;
  const item = pickRandom(pool, v => v.w);
  const wrong = pool.filter(v => v.w !== item.w)
    .sort(() => Math.random() - 0.5).slice(0, 3).map(v => v.m);
  const choices = [item.m, ...wrong].sort(() => Math.random() - 0.5);
  return { type: 'vocab', word: item.w, reading: item.r, answer: item.m, choices, lv: item.lv };
}

function genGrammarQuestion() {
  const pool = jlptGrammarPool();
  if (pool.length < 4) return null;
  const item = pickRandom(pool, g => g.p);
  const choices = item.c.slice().sort(() => Math.random() - 0.5);
  return { type: 'grammar', sentence: item.s, answer: item.a, choices, pattern: item.p, explanation: item.e || '', lv: item.lv };
}

function genGameQuestion() {
  const pool = gamePool();
  if (pool.length < 4) return null;
  const item = pickRandom(pool, v => v.w);
  const sameCat = gameData[gameId].vocab.filter(v => v.w !== item.w && v.cat === item.cat);
  const wrongSrc = sameCat.length >= 3 ? sameCat : gameData[gameId].vocab.filter(v => v.w !== item.w);
  const wrong = wrongSrc.sort(() => Math.random() - 0.5).slice(0, 3).map(v => v.m);
  const choices = [item.m, ...wrong].sort(() => Math.random() - 0.5);
  return { type: 'game', word: item.w, reading: item.r, answer: item.m, choices, cat: item.cat };
}

function genQuestion() {
  if (appMode === 'game') return genGameQuestion();
  return jlptMode === 'vocab' ? genVocabQuestion() : genGrammarQuestion();
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = genQuestion();
  const card = document.getElementById('card');
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  document.getElementById('choices').innerHTML = '';

  if (!q) {
    card.innerHTML = '<div class="card-error">項目が少なすぎます。フィルターを変えてください。</div>';
    current = null;
    return;
  }

  current = q;
  answered = false;

  if (q.type === 'vocab') {
    const rc = hideReading ? 'reading hidden-reading' : 'reading';
    card.innerHTML = `
      <div class="badges"><span class="badge ${q.lv}">${q.lv.toUpperCase()}</span></div>
      <div class="word">${q.word}</div>
      <div class="${rc}" id="reading-display">${q.reading}</div>`;

  } else if (q.type === 'grammar') {
    card.innerHTML = `
      <div class="badges">
        <span class="badge ${q.lv}">${q.lv.toUpperCase()}</span>
        <span class="badge pat">${q.pattern}</span>
      </div>
      <div class="sentence">${q.sentence}</div>`;

  } else {
    const showR = q.word !== q.reading;
    card.innerHTML = `
      <div class="badges">
        <span class="badge game">${gameData[gameId].label}</span>
        <span class="badge cat">${q.cat}</span>
      </div>
      <div class="word">${q.word}</div>
      ${showR ? `<div class="reading">${q.reading}</div>` : ''}`;
  }

  const choicesDiv = document.getElementById('choices');
  q.choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.dataset.choice = ch;
    btn.innerHTML = `<span class="num">${i + 1}</span>${ch}`;
    btn.addEventListener('click', () => choose(ch));
    choicesDiv.appendChild(btn);
  });
}

// ── Answer handling ──────────────────────────────────────────────────────────
function choose(choice) {
  if (!current) return;
  if (answered) { renderQuestion(); return; }
  answered = true;
  total++;

  const correct = choice === current.answer;
  if (correct) { score++; streak++; } else { streak = 0; }

  // Reveal furigana
  if (hideReading && current.type === 'vocab') {
    document.getElementById('reading-display')?.classList.remove('hidden-reading');
  }

  // Highlight choices
  document.querySelectorAll('.choice').forEach(btn => {
    if (btn.dataset.choice === current.answer) btn.classList.add('correct');
    else if (btn.dataset.choice === choice && !correct) btn.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('feedback');
  if (current.type === 'vocab') {
    const detail = `${current.word}【${current.reading}】= ${current.answer}`;
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    fb.textContent = correct ? `✓ Correct! ${detail}` : `✗ Wrong. ${detail}`;

  } else if (current.type === 'grammar') {
    const filled = current.sentence.replace('（　）', `「${current.answer}」`);
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Wrong.'}<br>${filled}<br><small>${current.explanation}</small>`;

  } else {
    const detail = `${current.word} = ${current.answer}`;
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    fb.textContent = correct ? `✓ Correct! ${detail}` : `✗ Wrong. ${detail}`;
  }

  updateScore();
  saveProgress();
}

// ── UI sync ──────────────────────────────────────────────────────────────────
function syncUI() {
  // App tabs
  document.getElementById('tab-jlpt').classList.toggle('active', appMode === 'jlpt');
  document.getElementById('tab-game').classList.toggle('active', appMode === 'game');
  document.getElementById('jlpt-controls').style.display = appMode === 'jlpt' ? '' : 'none';
  document.getElementById('game-controls').style.display = appMode === 'game' ? '' : 'none';

  // JLPT controls
  document.querySelectorAll('.lvl-btn').forEach(b =>
    b.classList.toggle('active', activeLevels.has(b.dataset.lv)));
  document.getElementById('tab-vocab').classList.toggle('active', jlptMode === 'vocab');
  document.getElementById('tab-grammar').classList.toggle('active', jlptMode === 'grammar');
  document.getElementById('prio-btn').classList.toggle('active', priorityOnly);
  document.getElementById('reading-btn').classList.toggle('active', hideReading);

  // Game controls
  document.querySelectorAll('#game-selector .ctrl-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.game === gameId));
  renderCatButtons();
}

function renderCatButtons() {
  const container = document.getElementById('cat-btns');
  container.innerHTML = '';
  gameData[gameId].cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn' + (cat === gameCategory ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      gameCategory = cat;
      recentKeys = [];
      renderCatButtons();
      renderQuestion();
    });
    container.appendChild(btn);
  });
}

function updateScore() {
  document.getElementById('score-display').textContent = `${score} / ${total}`;
  const s = document.getElementById('streak-display');
  s.textContent = streak >= 3 ? `🔥 ${streak}` : '';
}

// ── Persistence ──────────────────────────────────────────────────────────────
function encodeState() {
  return btoa(JSON.stringify({
    s: score, t: total, x: streak,
    am: appMode, jm: jlptMode,
    lv: [...activeLevels],
    p: priorityOnly ? 1 : 0,
    hr: hideReading ? 1 : 0,
    gi: gameId, gc: gameCategory,
  }));
}

function applyState(st) {
  score = st.s || 0; total = st.t || 0; streak = st.x || 0;
  appMode = st.am || 'jlpt';
  jlptMode = st.jm || st.m || 'vocab';
  activeLevels = new Set(st.lv || ['n3']);
  priorityOnly = !!st.p;
  hideReading = !!st.hr;
  gameId = st.gi || 'pokemon';
  gameCategory = st.gc || 'すべて';
  syncUI();
  updateScore();
}

function saveProgress() {
  try { localStorage.setItem('tsubaki_driller', encodeState()); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('tsubaki_driller') || localStorage.getItem('tsubaki_progress');
    if (raw) applyState(JSON.parse(atob(raw)));
  } catch(e) {}
}

// ── Event listeners ──────────────────────────────────────────────────────────
document.getElementById('tab-jlpt').addEventListener('click', () => {
  appMode = 'jlpt'; recentKeys = []; syncUI(); renderQuestion();
});

document.getElementById('tab-game').addEventListener('click', () => {
  appMode = 'game'; recentKeys = []; syncUI(); renderQuestion();
});

document.querySelectorAll('.lvl-btn').forEach(b => {
  b.addEventListener('click', () => {
    if (activeLevels.has(b.dataset.lv)) {
      if (activeLevels.size > 1) activeLevels.delete(b.dataset.lv);
    } else {
      activeLevels.add(b.dataset.lv);
    }
    recentKeys = []; syncUI(); renderQuestion();
  });
});

document.getElementById('tab-vocab').addEventListener('click', () => {
  jlptMode = 'vocab'; recentKeys = []; syncUI(); renderQuestion();
});

document.getElementById('tab-grammar').addEventListener('click', () => {
  jlptMode = 'grammar'; recentKeys = []; syncUI(); renderQuestion();
});

document.getElementById('prio-btn').addEventListener('click', () => {
  priorityOnly = !priorityOnly; recentKeys = []; syncUI(); renderQuestion();
});

document.getElementById('reading-btn').addEventListener('click', () => {
  hideReading = !hideReading; syncUI();
});

document.querySelectorAll('#game-selector .ctrl-btn').forEach(b => {
  b.addEventListener('click', () => {
    gameId = b.dataset.game;
    gameCategory = 'すべて';
    recentKeys = [];
    syncUI();
    renderQuestion();
  });
});

document.getElementById('next-btn').addEventListener('click', () => {
  renderQuestion();
});

document.getElementById('save-btn').addEventListener('click', () => {
  const area = document.getElementById('save-area');
  const showing = area.style.display !== 'none';
  area.style.display = showing ? 'none' : '';
  if (!showing) {
    const code = encodeState();
    document.getElementById('save-code').value = code;
    document.getElementById('save-code').select();
    try { document.execCommand('copy'); } catch(e) {}
  }
});

document.getElementById('load-btn').addEventListener('click', () => {
  const raw = document.getElementById('load-input').value.trim();
  if (!raw) return;
  try {
    applyState(JSON.parse(atob(raw)));
    recentKeys = [];
    document.getElementById('save-area').style.display = 'none';
    document.getElementById('load-input').value = '';
    renderQuestion();
  } catch(e) {
    alert('コードが無効です');
  }
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (answered || !current) {
    if (e.key === ' ' || e.key === 'Enter' || (e.key >= '1' && e.key <= '4')) {
      e.preventDefault();
      renderQuestion();
    }
    return;
  }

  const n = parseInt(e.key);
  if (n >= 1 && n <= 4) {
    const btns = document.querySelectorAll('.choice');
    if (btns[n - 1]) btns[n - 1].click();
  }
});

// ── Init ─────────────────────────────────────────────────────────────────────
loadProgress();
renderQuestion();
</script>
</body>
</html>
