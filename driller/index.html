<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tsubaki Driller</title>
<script src="data-jlpt.js"></script>
<script src="data-games.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme variables ───────────────────────────────────────── */
:root {
  --bg:          #1a1a2e;
  --surface:     #16213e;
  --surface2:    #0f3460;
  --accent:      #e94560;
  --text:        #eee;
  --text-muted:  #aaa;
  --text-dim:    #666;
  --border:      #0f3460;
  --ok-bg:       #1b5e20;
  --ok-border:   #4caf50;
  --ok-text:     #c8e6c9;
  --err-bg:      #7f0000;
  --err-border:  #e53935;
  --err-text:    #ffcdd2;
}

body.light {
  --bg:         #f2f1ec;
  --surface:    #ffffff;
  --surface2:   #e0dfd8;
  --accent:     #c0392b;
  --text:       #1a1a2e;
  --text-muted: #666;
  --text-dim:   #999;
  --border:     #ccc;
  --ok-bg:      #e8f5e9;
  --ok-border:  #4caf50;
  --ok-text:    #1b5e20;
  --err-bg:     #ffebee;
  --err-border: #e53935;
  --err-text:   #7f0000;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 8px 40px;
  transition: background 0.2s, color 0.2s;
}

#app {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Top bar (app tabs + utility toggles) ──────────────────── */
.top-bar {
  display: flex;
  gap: 6px;
  align-items: center;
}

.app-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border-radius: 10px;
  padding: 4px;
  flex: 1;
}

.app-tab {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s, color 0.15s;
}

.app-tab.active { background: var(--accent); color: #fff; }

.util-btn {
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
  white-space: nowrap;
}

.util-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Controls ──────────────────────────────────────────────── */
.controls {
  background: var(--surface);
  border-radius: 10px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.btn-row.spaced { justify-content: space-between; }

.ctrl-btn {
  padding: 6px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 0.12s;
  white-space: nowrap;
}

.ctrl-btn:hover { border-color: var(--accent); color: var(--text); }
.ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.ctrl-btn.n5.active { background: #2e7d32; border-color: #4caf50; }
.ctrl-btn.n4.active { background: #e65100; border-color: #ff9800; }

.spacer { flex: 1; }

/* ── Card ──────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: 14px;
  padding: 28px 20px 20px;
  min-height: 140px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-align: center;
}

.badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 4px;
}

.badge {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

.badge.n5  { background: #1b5e20; color: #a5d6a7; }
.badge.n4  { background: #e65100; color: #ffe0b2; }
.badge.n3  { background: #b71c1c; color: #ffcdd2; }
.badge.pat { background: #1a237e; color: #c5cae9; font-size: 0.68rem; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge.cat { background: #1a3a4a; color: #b0d4e8; }
.badge.game-lbl { background: #2a1a4a; color: #c9b0e8; }

body.light .badge.n5  { background: #c8e6c9; color: #1b5e20; }
body.light .badge.n4  { background: #ffe0b2; color: #e65100; }
body.light .badge.n3  { background: #ffcdd2; color: #b71c1c; }
body.light .badge.pat { background: #c5cae9; color: #1a237e; }
body.light .badge.cat { background: #b0d4e8; color: #1a3a4a; }
body.light .badge.game-lbl { background: #c9b0e8; color: #2a1a4a; }

.word {
  font-size: 2.4rem;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: 0.05em;
}

.reading {
  font-size: 1rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}

.hidden-reading { visibility: hidden; }

.sentence {
  font-size: 1.3rem;
  line-height: 1.6;
  letter-spacing: 0.05em;
  max-width: 420px;
}

.card-error {
  color: var(--accent);
  font-size: 0.9rem;
  padding: 20px;
}

/* ── Choices ───────────────────────────────────────────────── */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.choice {
  padding: 12px 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  font-size: 0.9rem;
  cursor: pointer;
  text-align: left;
  line-height: 1.4;
  transition: border-color 0.1s, background 0.1s;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.choice:hover { border-color: var(--accent); }
.choice.correct { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok-text); }
.choice.wrong   { background: var(--err-bg); border-color: var(--err-border); color: var(--err-text); }

.choice .num {
  font-size: 0.75rem;
  color: var(--text-dim);
  flex-shrink: 0;
  padding-top: 2px;
}

/* ── Feedback ──────────────────────────────────────────────── */
.feedback {
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.9rem;
  line-height: 1.6;
  display: none;
  text-align: center;
}

.feedback.show   { display: block; }
.feedback.correct { background: var(--ok-bg);  color: var(--ok-text); }
.feedback.wrong   { background: var(--err-bg); color: var(--err-text); }
.feedback small { display: block; margin-top: 4px; opacity: 0.8; font-size: 0.82rem; }

/* ── Status bar ────────────────────────────────────────────── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 2px;
  flex-wrap: wrap;
}

#score-display  { font-size: 0.88rem; color: var(--text-muted); }
#streak-display { font-size: 0.88rem; color: #ffd54f; }

.icon-btn {
  padding: 5px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.78rem;
  cursor: pointer;
  transition: border-color 0.1s, color 0.1s;
  white-space: nowrap;
}

.icon-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Save/load area ────────────────────────────────────────── */
#save-area {
  background: var(--surface);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#save-code {
  width: 100%;
  height: 60px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 0.75rem;
  font-family: monospace;
  padding: 6px;
  resize: none;
}

.load-row { display: flex; gap: 6px; }

#load-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.8rem;
  padding: 6px 8px;
  outline: none;
}

#load-input:focus { border-color: var(--accent); }

#load-btn {
  padding: 6px 12px;
  background: var(--accent);
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
}

@media (max-width: 400px) {
  .word { font-size: 1.9rem; }
  .choices { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="app">

  <!-- Top bar: app tabs + theme/lang toggles -->
  <div class="top-bar">
    <div class="app-tabs">
      <button class="app-tab active" id="tab-jlpt">JLPT</button>
      <button class="app-tab" id="tab-game">ゲーム</button>
    </div>
    <button class="util-btn" id="theme-btn">☀</button>
    <button class="util-btn" id="lang-btn">EN</button>
  </div>

  <!-- JLPT controls -->
  <div class="controls" id="jlpt-controls">
    <div class="btn-row spaced">
      <button class="ctrl-btn lvl-btn n5" data-lv="n5">N5</button>
      <button class="ctrl-btn lvl-btn n4" data-lv="n4">N4</button>
      <button class="ctrl-btn lvl-btn n3 active" data-lv="n3">N3</button>
      <div class="spacer"></div>
      <button class="ctrl-btn" id="prio-btn">⭐ 優先</button>
      <button class="ctrl-btn" id="reading-btn">ふり</button>
    </div>
    <div class="btn-row">
      <button class="ctrl-btn active" id="tab-vocab">語彙</button>
      <button class="ctrl-btn" id="tab-grammar">文法</button>
    </div>
  </div>

  <!-- Game controls -->
  <div class="controls" id="game-controls" style="display:none">
    <div class="btn-row" id="game-selector">
      <button class="ctrl-btn active" data-game="pokemon">ポケモン</button>
      <button class="ctrl-btn" data-game="acnh">どうぶつの森</button>
      <button class="ctrl-btn" data-game="dq11">DQ XI</button>
    </div>
    <div class="btn-row" id="cat-btns"></div>
  </div>

  <!-- Card -->
  <div class="card" id="card"></div>

  <!-- Choices -->
  <div class="choices" id="choices"></div>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="score-display">0 / 0</span>
    <span id="streak-display"></span>
    <div class="spacer"></div>
    <button class="icon-btn" id="save-btn">💾 セーブ</button>
    <button class="icon-btn" id="next-btn">→ 次へ</button>
  </div>

  <!-- Save / load -->
  <div id="save-area" style="display:none">
    <textarea id="save-code" readonly></textarea>
    <div class="load-row">
      <input id="load-input" type="text" placeholder="セーブコードを貼り付け…">
      <button id="load-btn">読み込む</button>
    </div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let appMode = 'jlpt';
let jlptMode = 'vocab';
let activeLevels = new Set(['n3']);
let priorityOnly = false;
let hideReading = false;
let gameId = 'pokemon';
let gameCategory = 'すべて';
let score = 0, total = 0, streak = 0;
let answered = false;
let current = null;
let recentKeys = [];
let theme = 'dark';
let uiLang = 'ja';

// ── UI labels ────────────────────────────────────────────────────────────────
const L = {
  ja: {
    tabGame: 'ゲーム', tabVocab: '語彙', tabGrammar: '文法',
    prio: '⭐ 優先', furigana: 'ふり',
    save: '💾 セーブ', next: '→ 次へ',
    load: '読み込む', loadPlaceholder: 'セーブコードを貼り付け…',
    langBtn: 'EN',
    noItems: '項目が少なすぎます。フィルターを変えてください。',
  },
  en: {
    tabGame: 'Game', tabVocab: 'Vocab', tabGrammar: 'Grammar',
    prio: '⭐ Priority', furigana: 'Furigana',
    save: '💾 Save', next: '→ Next',
    load: 'Load', loadPlaceholder: 'Paste save code…',
    langBtn: 'JP',
    noItems: 'Not enough items. Change the filters.',
  },
};

// ── Pool helpers ──────────────────────────────────────────────────────────────
function jlptVocabPool() {
  return vocab.filter(v => activeLevels.has(v.lv) && (!priorityOnly || v.p));
}
function jlptGrammarPool() {
  return grammar.filter(g => activeLevels.has(g.lv) && (!priorityOnly || g.pr));
}
function gamePool() {
  const g = gameData[gameId];
  return gameCategory === 'すべて' ? g.vocab : g.vocab.filter(v => v.cat === gameCategory);
}
function pickRandom(pool, keyFn) {
  if (!pool.length) return null;
  let item, tries = 0;
  do {
    item = pool[Math.floor(Math.random() * pool.length)];
    tries++;
  } while (recentKeys.includes(keyFn(item)) && tries < 20);
  recentKeys.push(keyFn(item));
  const cap = Math.max(4, Math.floor(pool.length / 2));
  if (recentKeys.length > cap) recentKeys.shift();
  return item;
}

// ── Question generators ───────────────────────────────────────────────────────
function genVocabQuestion() {
  const pool = jlptVocabPool();
  if (pool.length < 4) return null;
  const item = pickRandom(pool, v => v.w);
  const wrong = pool.filter(v => v.w !== item.w)
    .sort(() => Math.random() - 0.5).slice(0, 3).map(v => v.m);
  const choices = [item.m, ...wrong].sort(() => Math.random() - 0.5);
  return { type: 'vocab', word: item.w, reading: item.r, answer: item.m, choices, lv: item.lv };
}
function genGrammarQuestion() {
  const pool = jlptGrammarPool();
  if (pool.length < 4) return null;
  const item = pickRandom(pool, g => g.p);
  const choices = item.c.slice().sort(() => Math.random() - 0.5);
  return { type: 'grammar', sentence: item.s, answer: item.a, choices, pattern: item.p, explanation: item.e || '', lv: item.lv };
}
function genGameQuestion() {
  if (gameCategory === 'セリフ') {
    const pool = gameData[gameId].dialogues;
    if (!pool || pool.length < 4) return null;
    const item = pickRandom(pool, d => d.s);
    const choices = item.c.slice().sort(() => Math.random() - 0.5);
    return { type: 'dialogue', sentence: item.s, speaker: item.sp, answer: item.a, choices, explanation: item.e };
  }
  const pool = gamePool();
  if (pool.length < 4) return null;
  const item = pickRandom(pool, v => v.w);
  const sameCat = gameData[gameId].vocab.filter(v => v.w !== item.w && v.cat === item.cat);
  const wrongSrc = sameCat.length >= 3 ? sameCat : gameData[gameId].vocab.filter(v => v.w !== item.w);
  const wrong = wrongSrc.sort(() => Math.random() - 0.5).slice(0, 3).map(v => v.m);
  const choices = [item.m, ...wrong].sort(() => Math.random() - 0.5);
  return { type: 'game', word: item.w, reading: item.r, answer: item.m, choices, cat: item.cat };
}
function genQuestion() {
  if (appMode === 'game') return genGameQuestion();
  return jlptMode === 'vocab' ? genVocabQuestion() : genGrammarQuestion();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = genQuestion();
  const card = document.getElementById('card');
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('choices').innerHTML = '';

  if (!q) {
    card.innerHTML = `<div class="card-error">${L[uiLang].noItems}</div>`;
    current = null;
    return;
  }

  current = q;
  answered = false;

  if (q.type === 'vocab') {
    const rc = hideReading ? 'reading hidden-reading' : 'reading';
    card.innerHTML = `
      <div class="badges"><span class="badge ${q.lv}">${q.lv.toUpperCase()}</span></div>
      <div class="word">${q.word}</div>
      <div class="${rc}" id="reading-display">${q.reading}</div>`;
  } else if (q.type === 'grammar') {
    card.innerHTML = `
      <div class="badges">
        <span class="badge ${q.lv}">${q.lv.toUpperCase()}</span>
        <span class="badge pat">${q.pattern}</span>
      </div>
      <div class="sentence">${q.sentence}</div>`;
  } else if (q.type === 'dialogue') {
    card.innerHTML = `
      <div class="badges">
        <span class="badge game-lbl">${gameData[gameId].label}</span>
        <span class="badge cat">${q.speaker}</span>
      </div>
      <div class="sentence">${q.sentence}</div>`;
  } else {
    const showR = q.word !== q.reading;
    card.innerHTML = `
      <div class="badges">
        <span class="badge game-lbl">${gameData[gameId].label}</span>
        <span class="badge cat">${q.cat}</span>
      </div>
      <div class="word">${q.word}</div>
      ${showR ? `<div class="reading">${q.reading}</div>` : ''}`;
  }

  const choicesDiv = document.getElementById('choices');
  choicesDiv.style.gridTemplateColumns = q.type === 'dialogue' ? '1fr' : '';
  q.choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.dataset.choice = ch;
    btn.innerHTML = `<span class="num">${i + 1}</span>${ch}`;
    btn.addEventListener('click', () => choose(ch));
    choicesDiv.appendChild(btn);
  });
}

// ── Answer ────────────────────────────────────────────────────────────────────
function choose(choice) {
  if (!current) return;
  if (answered) { renderQuestion(); return; }
  answered = true;
  total++;

  const correct = choice === current.answer;
  if (correct) { score++; streak++; } else { streak = 0; }

  if (hideReading && current.type === 'vocab') {
    document.getElementById('reading-display')?.classList.remove('hidden-reading');
  }

  document.querySelectorAll('.choice').forEach(btn => {
    if (btn.dataset.choice === current.answer) btn.classList.add('correct');
    else if (btn.dataset.choice === choice && !correct) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  if (current.type === 'vocab') {
    const detail = `${current.word}【${current.reading}】= ${current.answer}`;
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    fb.textContent = correct ? `✓ Correct! ${detail}` : `✗ Wrong. ${detail}`;
  } else if (current.type === 'grammar') {
    const filled = current.sentence.replace('（　）', `「${current.answer}」`);
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Wrong.'}<br>${filled}<br><small>${current.explanation}</small>`;
  } else if (current.type === 'dialogue') {
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Wrong.'}<br><small>${current.answer}</small><br><small style="opacity:0.7">${current.explanation}</small>`;
  } else {
    const detail = `${current.word} = ${current.answer}`;
    fb.className = correct ? 'feedback correct show' : 'feedback wrong show';
    fb.textContent = correct ? `✓ Correct! ${detail}` : `✗ Wrong. ${detail}`;
  }

  updateScore();
  saveProgress();
}

// ── UI sync ───────────────────────────────────────────────────────────────────
function syncUI() {
  document.getElementById('tab-jlpt').classList.toggle('active', appMode === 'jlpt');
  document.getElementById('tab-game').classList.toggle('active', appMode === 'game');
  document.getElementById('jlpt-controls').style.display = appMode === 'jlpt' ? '' : 'none';
  document.getElementById('game-controls').style.display  = appMode === 'game'  ? '' : 'none';

  document.querySelectorAll('.lvl-btn').forEach(b =>
    b.classList.toggle('active', activeLevels.has(b.dataset.lv)));
  document.getElementById('tab-vocab').classList.toggle('active', jlptMode === 'vocab');
  document.getElementById('tab-grammar').classList.toggle('active', jlptMode === 'grammar');
  document.getElementById('prio-btn').classList.toggle('active', priorityOnly);
  document.getElementById('reading-btn').classList.toggle('active', hideReading);

  document.querySelectorAll('#game-selector .ctrl-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.game === gameId));
  renderCatButtons();
}

function renderCatButtons() {
  const container = document.getElementById('cat-btns');
  container.innerHTML = '';
  gameData[gameId].cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn' + (cat === gameCategory ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      gameCategory = cat; recentKeys = []; renderCatButtons(); renderQuestion();
    });
    container.appendChild(btn);
  });
}

function updateScore() {
  document.getElementById('score-display').textContent = `${score} / ${total}`;
  document.getElementById('streak-display').textContent = streak >= 3 ? `🔥 ${streak}` : '';
}

// ── Theme & language ──────────────────────────────────────────────────────────
function applyTheme() {
  document.body.classList.toggle('light', theme === 'light');
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀' : '🌙';
  try { localStorage.setItem('tsubaki_theme', theme); } catch(e) {}
}

function applyUiLang() {
  const l = L[uiLang];
  document.getElementById('tab-game').textContent    = l.tabGame;
  document.getElementById('tab-vocab').textContent   = l.tabVocab;
  document.getElementById('tab-grammar').textContent = l.tabGrammar;
  document.getElementById('prio-btn').textContent    = l.prio;
  document.getElementById('reading-btn').textContent = l.furigana;
  document.getElementById('save-btn').textContent    = l.save;
  document.getElementById('next-btn').textContent    = l.next;
  document.getElementById('load-btn').textContent    = l.load;
  document.getElementById('load-input').placeholder  = l.loadPlaceholder;
  document.getElementById('lang-btn').textContent    = l.langBtn;
  // re-apply active classes cleared by textContent assignment
  syncUI();
  try { localStorage.setItem('tsubaki_lang', uiLang); } catch(e) {}
}

// ── Persistence ───────────────────────────────────────────────────────────────
function encodeState() {
  return btoa(JSON.stringify({
    s: score, t: total, x: streak,
    am: appMode, jm: jlptMode,
    lv: [...activeLevels],
    p: priorityOnly ? 1 : 0,
    hr: hideReading ? 1 : 0,
    gi: gameId, gc: gameCategory,
  }));
}
function applyState(st) {
  score = st.s || 0; total = st.t || 0; streak = st.x || 0;
  appMode  = st.am || 'jlpt';
  jlptMode = st.jm || st.m || 'vocab';
  activeLevels = new Set(st.lv || ['n3']);
  priorityOnly = !!st.p; hideReading = !!st.hr;
  gameId = st.gi || 'pokemon';
  gameCategory = st.gc || 'すべて';
  syncUI(); updateScore();
}
function saveProgress() {
  try { localStorage.setItem('tsubaki_driller', encodeState()); } catch(e) {}
}
function loadProgress() {
  try {
    const raw = localStorage.getItem('tsubaki_driller') || localStorage.getItem('tsubaki_progress');
    if (raw) applyState(JSON.parse(atob(raw)));
  } catch(e) {}
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('tab-jlpt').addEventListener('click', () => {
  appMode = 'jlpt'; recentKeys = []; syncUI(); renderQuestion();
});
document.getElementById('tab-game').addEventListener('click', () => {
  appMode = 'game'; recentKeys = []; syncUI(); renderQuestion();
});
document.querySelectorAll('.lvl-btn').forEach(b => {
  b.addEventListener('click', () => {
    if (activeLevels.has(b.dataset.lv)) {
      if (activeLevels.size > 1) activeLevels.delete(b.dataset.lv);
    } else {
      activeLevels.add(b.dataset.lv);
    }
    recentKeys = []; syncUI(); renderQuestion();
  });
});
document.getElementById('tab-vocab').addEventListener('click', () => {
  jlptMode = 'vocab'; recentKeys = []; syncUI(); renderQuestion();
});
document.getElementById('tab-grammar').addEventListener('click', () => {
  jlptMode = 'grammar'; recentKeys = []; syncUI(); renderQuestion();
});
document.getElementById('prio-btn').addEventListener('click', () => {
  priorityOnly = !priorityOnly; recentKeys = []; syncUI(); renderQuestion();
});
document.getElementById('reading-btn').addEventListener('click', () => {
  hideReading = !hideReading; syncUI();
});
document.querySelectorAll('#game-selector .ctrl-btn').forEach(b => {
  b.addEventListener('click', () => {
    gameId = b.dataset.game; gameCategory = 'すべて'; recentKeys = []; syncUI(); renderQuestion();
  });
});
document.getElementById('next-btn').addEventListener('click', renderQuestion);

document.getElementById('theme-btn').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
});
document.getElementById('lang-btn').addEventListener('click', () => {
  uiLang = uiLang === 'ja' ? 'en' : 'ja';
  applyUiLang();
});

document.getElementById('save-btn').addEventListener('click', () => {
  const area = document.getElementById('save-area');
  const showing = area.style.display !== 'none';
  area.style.display = showing ? 'none' : '';
  if (!showing) {
    const ta = document.getElementById('save-code');
    ta.value = encodeState();
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
  }
});
document.getElementById('load-btn').addEventListener('click', () => {
  const raw = document.getElementById('load-input').value.trim();
  if (!raw) return;
  try {
    applyState(JSON.parse(atob(raw)));
    recentKeys = [];
    document.getElementById('save-area').style.display = 'none';
    document.getElementById('load-input').value = '';
    renderQuestion();
  } catch(e) { alert(uiLang === 'ja' ? 'コードが無効です' : 'Invalid save code'); }
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (answered || !current) {
    if (e.key === ' ' || e.key === 'Enter' || (e.key >= '1' && e.key <= '4')) {
      e.preventDefault(); renderQuestion();
    }
    return;
  }
  const n = parseInt(e.key);
  if (n >= 1 && n <= 4) {
    const btns = document.querySelectorAll('.choice');
    if (btns[n - 1]) btns[n - 1].click();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
try { theme  = localStorage.getItem('tsubaki_theme') || 'dark'; } catch(e) {}
try { uiLang = localStorage.getItem('tsubaki_lang')  || 'ja';   } catch(e) {}
applyTheme();
loadProgress();
applyUiLang();
renderQuestion();
</script>
</body>
</html>
