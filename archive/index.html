<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>archive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #0e0e12;
      color: #d4d4cc;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 48px 24px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── night scene ───────────────────────────────────────────────────── */
    .night-scene {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
      transition: opacity 2.5s ease;
      background: linear-gradient(to bottom,
        #03030e 0%, #07071e 35%, #0c1226 65%, #101820 100%);
    }
    body.theme-kaguya .night-scene { opacity: 1; }

    /* stars */
    #starCanvas { position: absolute; inset: 0; }

    /* moon */
    .moon {
      position: absolute;
      top: 7vh;
      right: 12vw;
      width: 148px;
      height: 148px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%,
        #fffef8, #f7e87a 52%, #e2c848);
      box-shadow:
        0 0 24px 9px  rgba(255, 244, 155, 0.50),
        0 0 65px 30px rgba(255, 235, 120, 0.24),
        0 0 140px 70px rgba(255, 222, 80, 0.09);
      animation: moonPulse 7s ease-in-out infinite;
    }
    .moon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 62% 28%, rgba(255,255,255,0.18) 0%, transparent 35%),
        radial-gradient(circle at 28% 68%, rgba(200,185,140,0.22) 0%, transparent 28%);
    }
    @keyframes moonPulse {
      0%, 100% {
        box-shadow:
          0 0 24px 9px  rgba(255,244,155,.50),
          0 0 65px 30px rgba(255,235,120,.24),
          0 0 140px 70px rgba(255,222,80,.09);
      }
      50% {
        box-shadow:
          0 0 34px 14px rgba(255,244,155,.60),
          0 0 88px 42px rgba(255,235,120,.30),
          0 0 190px 95px rgba(255,222,80,.12);
      }
    }

    /* bamboo */
    .bamboo-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 280px;
      height: 92%;
      pointer-events: none;
      filter: drop-shadow(0 0 10px rgba(55, 170, 75, 0.22));
    }
    .bamboo-wrap svg { width: 100%; height: 100%; }

    /* the segment where something is folded shut, glowing softly */
    .glow-halo {
      fill: #ffe9ac;
      filter: blur(5px);
      opacity: .45;
      animation: bambooGlow 3.4s ease-in-out infinite;
    }
    .glow-core {
      fill: #fff8e2;
      opacity: .75;
      animation: bambooGlow 3.4s ease-in-out infinite;
    }
    @keyframes bambooGlow {
      0%, 100% { opacity: .30; }
      50%      { opacity: .80; }
    }

    /* rustle bubble */
    .bamboo-bubble {
      position: fixed;
      z-index: 5;
      transform: translate(-50%, -100%);
      background: rgba(18, 24, 18, 0.92);
      border: 1px solid #3a4a3a;
      color: #e8e0c5;
      padding: 7px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .bamboo-bubble::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -6px;
      transform: translateX(-50%);
      border-width: 6px 6px 0 6px;
      border-style: solid;
      border-color: rgba(18, 24, 18, 0.92) transparent transparent transparent;
    }
    .bamboo-bubble.show { opacity: 1; transform: translate(-50%, -114%); }

    /* invisible plain-HTML button overlaid on the glow via JS, sidesteps
       filter+pointer-events-none-ancestor SVG hit-testing bugs on mobile */
    .bamboo-hotspot {
      position: fixed;
      background: transparent;
      border: none;
      padding: 0;
      pointer-events: none;
      z-index: 2;
    }
    body.theme-kaguya .bamboo-hotspot { pointer-events: auto; cursor: pointer; }

    /* leaf sway */
    .la { animation: swayA 5.2s ease-in-out infinite;       transform-origin: 50% 100%; }
    .lb { animation: swayB 4.1s ease-in-out infinite;       transform-origin: 50% 100%; }
    .lc { animation: swayA 6.0s ease-in-out infinite 0.9s;  transform-origin: 50% 100%; }
    .ld { animation: swayB 4.7s ease-in-out infinite 1.6s;  transform-origin: 50% 100%; }
    @keyframes swayA { 0%,100% { transform: rotate(-2deg) }   50% { transform: rotate(2.5deg) } }
    @keyframes swayB { 0%,100% { transform: rotate(1.5deg) }  50% { transform: rotate(-2deg) } }

    /* ground mist */
    .mist {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 110px;
      background: linear-gradient(to top, rgba(6,10,22,0.80) 0%, transparent 100%);
    }

    /* ── touhou scene: gensokyo at dusk ──────────────────────────────────── */
    .touhou-scene {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
      transition: opacity 2.5s ease;
      background: linear-gradient(to bottom,
        #241640 0%, #3f2050 13%, #6b2f5e 26%, #9c3f68 39%, #c8506a 51%,
        #e06f56 62%, #ec8c4e 72%, #f4ac5a 81%, #f9c877 89%, #fde3a3 96%, #fff0c2 100%);
    }
    body.theme-touhou .touhou-scene { opacity: 1; }

    .touhou-cloud {
      position: absolute;
      border-radius: 50%;
      filter: blur(20px);
      background: radial-gradient(ellipse at center, rgba(255,224,190,0.75), transparent 72%);
    }
    .c1 { width: 280px; height: 62px; left: 6%;  top: 20%; opacity: .4; }
    .c2 { width: 360px; height: 76px; left: 52%; top: 12%; opacity: .32; }
    .c3 { width: 230px; height: 52px; left: 28%; top: 30%; opacity: .26; }

    .touhou-glow {
      position: absolute;
      left: 62%;
      bottom: 22%;
      width: 900px;
      height: 900px;
      transform: translate(-50%, 50%);
      background: radial-gradient(circle,
        rgba(255,220,160,0.55) 0%, rgba(255,175,115,0.28) 30%,
        rgba(225,110,110,0.12) 55%, transparent 75%);
      mix-blend-mode: screen;
    }
    .touhou-rays {
      position: absolute;
      left: 62%;
      bottom: 22%;
      width: 1300px;
      height: 1300px;
      transform: translate(-50%, 50%);
      background: repeating-conic-gradient(from 0deg,
        rgba(255,236,195,0.16) 0deg 4deg, transparent 4deg 16deg);
      -webkit-mask-image: radial-gradient(circle, black 0%, black 22%, transparent 65%);
              mask-image: radial-gradient(circle, black 0%, black 22%, transparent 65%);
      mix-blend-mode: soft-light;
      animation: raysDrift 50s linear infinite;
    }
    @keyframes raysDrift { to { transform: translate(-50%, 50%) rotate(360deg); } }

    .touhou-sun {
      position: absolute;
      left: 62%;
      bottom: 22%;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      transform: translate(-50%, 50%);
      background: radial-gradient(circle at 45% 40%, #fffaea, #ffd98a 55%, #ff9d5c 85%);
      box-shadow:
        0 0 36px 16px rgba(255, 205, 130, 0.65),
        0 0 90px 46px rgba(255, 170, 100, 0.38),
        0 0 180px 90px rgba(255, 140, 90, 0.18);
    }

    .touhou-land { position: absolute; inset: 0; width: 100%; height: 100%; }

    .sakura {
      position: absolute;
      top: -5%;
      width: 8px;
      height: 8px;
      background: radial-gradient(circle at 35% 35%, #ffd9e6, #ff9dbb 70%);
      border-radius: 60% 40% 60% 40%;
      opacity: 0;
      animation: sakuraFall linear infinite;
    }
    .s1 { left: 15%; animation-duration: 11s; animation-delay: 0s; }
    .s2 { left: 35%; animation-duration: 14s; animation-delay: 3s; }
    .s3 { left: 55%; animation-duration: 9s;  animation-delay: 1.5s; }
    .s4 { left: 75%; animation-duration: 13s; animation-delay: 5s; }
    .s5 { left: 90%; animation-duration: 10s; animation-delay: 2s; }
    @keyframes sakuraFall {
      0%   { transform: translate(0, 0) rotate(0deg);        opacity: 0; }
      10%  { opacity: .85; }
      90%  { opacity: .7; }
      100% { transform: translate(60px, 115vh) rotate(340deg); opacity: 0; }
    }

    .touhou-mist {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 130px;
      background: linear-gradient(to top, rgba(58,26,42,0.45) 0%, transparent 100%);
    }

    /* ── touhou text theme ────────────────────────────────────────────────  */
    body.theme-touhou .header h1       { color: #d98a6a; }
    body.theme-touhou .header h1 span  { color: #e0567a; }
    body.theme-touhou .code-input      { background: rgba(30,14,20,0.78); border-color: #5c2a34; color: #e8d2c8; }
    body.theme-touhou .code-btn        { background: rgba(30,14,20,0.78); border-color: #5c2a34; }
    body.theme-touhou .entry           { border-left-color: #7a3b46; }
    body.theme-touhou .entry-meta .tag { color: #e0567a; }
    body.theme-touhou .entry-title     { color: #f0ddd0; }
    body.theme-touhou .entry-content   { color: #c9a99a; }

    /* countdown */
    .countdown {
      display: none;
      max-width: 560px;
      margin: 0 auto 40px;
      text-align: center;
    }
    body.theme-kaguya .countdown { display: block; }
    .countdown-clock {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 2.6rem;
      letter-spacing: 0.08em;
      color: #f3e6a8;
      text-shadow: 0 0 18px rgba(255,230,140,0.55), 0 0 44px rgba(255,220,120,0.25);
    }

    /* ── touhou: no scroll + Exodia relic hunt ────────────────────────────── */
    body.theme-touhou { overflow: hidden; }
    body.theme-touhou .header { display: none; }
    body.theme-touhou .code-form { position: relative; z-index: 4; margin-bottom: 0; }

    .howto-btn {
      position: absolute;
      top: -10px; right: -10px;
      z-index: 6;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid #5c2a34;
      background: rgba(30,14,20,0.85);
      color: #e8d2c8;
      font-size: 0.85rem;
      display: flex;
      align-items: center; justify-content: center;
      cursor: pointer;
      pointer-events: auto;
    }
    .howto-btn:hover { background: rgba(50,22,30,0.9); }

    .relic-field {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding-top: 112px;
      pointer-events: none;
      z-index: 1;
    }
    body.theme-touhou .relic-field { display: flex; }

    .relic-stage {
      position: relative;
      width: min(76vw, 60vh);
      height: min(76vw, 60vh);
      max-width: 460px;
      max-height: 460px;
    }
    .relic-star-lines {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      overflow: visible;
    }
    .relic-star-lines path {
      fill: rgba(255, 205, 130, 0.06);
      stroke: rgba(255, 226, 180, 0.85);
      stroke-width: 1;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 5px rgba(255,190,110,0.85)) drop-shadow(0 0 12px rgba(255,160,90,0.5));
    }

    .relic {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 22%;
      padding: 0;
      pointer-events: auto;
      cursor: pointer;
      background: none;
      border: none;
    }
    .relic-frame {
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid rgba(255, 220, 160, 0.55);
      border-radius: 6px;
      background: #000;
      box-shadow: 0 0 12px rgba(0,0,0,0.4);
      overflow: hidden;
      position: relative;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .relic:hover .relic-frame { box-shadow: 0 0 18px rgba(255,180,110,0.5); }
    .relic.solved .relic-frame { border-color: #f6ab57; box-shadow: 0 0 16px 2px rgba(246,171,87,0.5); }
    .relic-preview {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 1px;
      width: 100%; height: 100%;
      background: #000;
    }
    .relic-preview > div { background-repeat: no-repeat; background-color: #050505; }
    .relic.solved .relic-preview { gap: 0; }
    .relic-check {
      position: absolute; right: 3px; bottom: 1px;
      font-size: 0.7rem; color: #f6ab57;
      text-shadow: 0 0 4px rgba(0,0,0,0.9);
    }

    .relic[data-part="head"]      { left: 50%; top: 13%; }
    .relic[data-part="leftArm"]   { left: 15%; top: 45%; }
    .relic[data-part="rightArm"]  { left: 85%; top: 45%; }
    .relic[data-part="leftLeg"]   { left: 28%; top: 84%; }
    .relic[data-part="rightLeg"]  { left: 72%; top: 84%; }

    .relic-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(19vw, 16vh, 124px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255, 220, 160, 0.5);
      background: radial-gradient(circle at 50% 45%, rgba(60,26,40,0.85), rgba(20,10,16,0.92));
      color: rgba(255, 225, 180, 0.62);
      pointer-events: auto;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1px;
      transition: box-shadow 0.5s, border-color 0.5s, color 0.5s;
    }
    .relic-center span { font-size: 1.1rem; line-height: 1; }
    .relic-center small { font-size: 0.56rem; letter-spacing: 0.08em; opacity: 0.75; }
    .relic-center.unlocked {
      border-color: #ffd27a;
      color: #ffe9c0;
      animation: centerPulse 2.6s ease-in-out infinite;
    }
    .relic-center.unlocked span { font-size: 1.35rem; font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: 0.1em; }
    @keyframes centerPulse {
      0%,100% { box-shadow: 0 0 20px 4px rgba(255,200,120,0.45), inset 0 0 14px rgba(255,190,110,0.3); }
      50%     { box-shadow: 0 0 34px 10px rgba(255,210,140,0.6), inset 0 0 22px rgba(255,200,130,0.45); }
    }

    /* reveal modal */
    .reveal-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      background: rgba(10, 6, 12, 0.86);
      z-index: 10;
    }
    .reveal-modal.open { display: flex; }
    .reveal-title { font-size: 0.95rem; letter-spacing: 0.05em; color: #f0ddd0; }
    .reveal-grid {
      width: min(78vw, 78vh, 420px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 3px;
      aspect-ratio: 1;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 8px 30px rgba(0,0,0,0.5);
      transition: box-shadow 0.6s ease, gap 0.4s ease;
    }
    .reveal-grid.solved { gap: 0; box-shadow: 0 0 30px 6px rgba(246,171,87,0.5); }
    .reveal-cell {
      background-color: #0c0810;
      background-repeat: no-repeat;
      transition: background-color 0.2s;
    }
    .reveal-progress { font-size: 0.8rem; color: rgba(233,210,200,0.75); letter-spacing: 0.03em; }

    .reveal-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .reveal-btn, .puzzle-back {
      background: rgba(30,14,20,0.8);
      border: 1px solid #5c2a34;
      color: #e8d2c8;
      padding: 8px 16px; border-radius: 4px;
      font-size: 0.85rem; cursor: pointer;
    }
    .reveal-btn:hover, .puzzle-back:hover { background: rgba(50,22,30,0.9); }
    .reveal-btn:disabled { opacity: 0.4; cursor: default; }
    .puzzle-back { align-self: flex-start; position: absolute; top: 20px; left: 20px; }

    .reveal-guess { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .reveal-guess-row { display: flex; gap: 8px; }
    .reveal-guess-row input {
      width: 160px;
      padding: 9px 12px;
      background: rgba(30,14,20,0.8);
      border: 1px solid #5c2a34;
      border-radius: 4px;
      color: #e8d2c8;
      font-size: 0.9rem;
      text-align: center;
      outline: none;
    }
    .reveal-guess-row input.error { border-color: #b3403f; animation: relicShake 0.25s; }
    @keyframes relicShake {
      0%,100% { transform: translateX(0) }
      25%      { transform: translateX(-6px) }
      75%      { transform: translateX(6px) }
    }
    .reveal-guess-row button {
      background: rgba(30,14,20,0.8);
      border: 1px solid #5c2a34;
      color: #e8d2c8;
      padding: 9px 16px; border-radius: 4px;
      font-size: 0.85rem; cursor: pointer;
    }
    .reveal-guess-row button:hover { background: rgba(50,22,30,0.9); }
    .reveal-hint { font-size: 0.72rem; color: rgba(233,210,200,0.55); }
    .reveal-solved-note { font-size: 0.85rem; color: #f6ab57; }

    /* how-to-play modal */
    .howto-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(10, 6, 12, 0.86);
      z-index: 11;
    }
    .howto-modal.open { display: flex; }
    .howto-card {
      position: relative;
      max-width: 380px;
      width: 100%;
      background: rgba(24,12,18,0.95);
      border: 1px solid #5c2a34;
      border-radius: 8px;
      padding: 24px 22px;
      color: #e8d2c8;
    }
    .howto-card h2 { font-size: 1rem; margin-bottom: 14px; color: #f0ddd0; }
    .howto-card ol { padding-left: 20px; display: flex; flex-direction: column; gap: 10px; font-size: 0.85rem; line-height: 1.5; color: #d8c5bc; }
    .howto-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none;
      color: #e8d2c8; font-size: 1rem; cursor: pointer;
      width: 26px; height: 26px;
    }

    /* ── kaguya text theme ─────────────────────────────────────────────── */
    body.theme-kaguya .header h1       { color: #7a9a88; }
    body.theme-kaguya .header h1 span  { color: #c9aa40; }
    body.theme-kaguya .code-input      { background: rgba(8,12,26,0.80); border-color: #243040; color: #c8c5b5; }
    body.theme-kaguya .code-btn        { background: rgba(8,12,26,0.80); border-color: #243040; }
    body.theme-kaguya .entry           { border-left-color: #2c4a38; }
    body.theme-kaguya .entry-meta .tag { color: #c9aa40; }
    body.theme-kaguya .entry-title     { color: #e8e0c5; }
    body.theme-kaguya .entry-content   { color: #b5ad98; }

    /* let clicks pass through to the bamboo behind empty parts of the page */
    .page { pointer-events: none; }
    .page .code-input, .page .code-btn, .page .entry-content a { pointer-events: auto; }

    /* ── header ────────────────────────────────────────────────────────── */
    .header { max-width: 560px; margin: 0 auto 48px; }
    .header h1 {
      font-size: 1rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: lowercase;
      color: #888; transition: color 2s;
    }
    .header h1 span { color: #c0392b; transition: color 2s; }

    /* ── code form ─────────────────────────────────────────────────────── */
    .code-form { max-width: 560px; margin: 0 auto 56px; }
    .code-row  { display: flex; gap: 8px; }
    .code-input {
      flex: 1; padding: 10px 14px;
      background: #1a1a22; border: 1px solid #2e2e3a; border-radius: 4px;
      color: #d4d4cc; font-size: 0.95rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.05em; outline: none;
      transition: border-color 0.15s, background 2s, color 2s;
    }
    .code-input::placeholder { color: #444; }
    .code-input:focus { border-color: #555; }
    .code-input.error { border-color: #8b2020; animation: shake 0.25s; }
    @keyframes shake {
      0%,100% { transform: translateX(0) }
      25%      { transform: translateX(-6px) }
      75%      { transform: translateX(6px) }
    }
    .code-btn {
      padding: 10px 20px; background: #1a1a22; border: 1px solid #2e2e3a;
      border-radius: 4px; color: #888; font-size: 0.85rem; cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 2s;
    }
    .code-btn:hover { background: #252530; color: #d4d4cc; }
    .code-msg { margin-top: 8px; font-size: 0.8rem; min-height: 1.2em; color: #8b2020; }
    .code-msg.ok { color: #4a8; }

    /* ── entries ───────────────────────────────────────────────────────── */
    .entries { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px; }
    .entry { border-left: 2px solid #2e2e3a; padding-left: 20px; transition: border-color 2s; }
    .entry-meta { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-bottom: 8px; }
    .entry-meta .tag { color: #c0392b; margin-right: 8px; transition: color 2s; }
    .entry-title { font-size: 1.05rem; font-weight: 600; color: #e0e0d8; margin-bottom: 12px; transition: color 2s; }
    .entry-content { font-size: 0.9rem; line-height: 1.75; color: #b0b0a8; transition: color 2s; }
    .entry-content p + p { margin-top: 0.9em; }
    .entry-content img { max-width: 100%; border-radius: 4px; margin-top: 8px; }

  <div class="howto-modal" id="howtoModal" aria-hidden="true">

      <h2>How to play</h2>
      <ol>
        <li>Grab your spellbook and draw a 3×3 grid on it.</li>
        <li>Each time a piece is revealed, sketch what you see into the matching square.</li>
        <li>Once all nine squares are filled in, type your guess for what the relic shows.</li>
      </ol>

  <script src="../jigsaw/jigsaw.js"></script>
  <script>
    // ── deterministic star field ─────────────────────────────────────────
    (function () {
      const cv  = document.getElementById('starCanvas');
      const ctx = cv.getContext('2d');
      function rng32(seed) {
        let s = seed;
        return () => {
          s = (s + 0x6D2B79F5) | 0;
          let t = Math.imul(s ^ (s >>> 15), 1 | s);
          t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      function draw() {
        cv.width = window.innerWidth;
        cv.height = window.innerHeight;
        const r = rng32(0xC4A6B8D2);
        for (let i = 0; i < 260; i++) {
          const x = r() * cv.width;
          const y = r() * cv.height * 0.84;
          const radius = r() * 0.9 + 0.25;
          const alpha  = r() * 0.60 + 0.22;
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,240,${alpha.toFixed(2)})`;
          ctx.fill();
        }
      }
      window.addEventListener('resize', draw);
      draw();
    })();

    // ── glowing bamboo segment ────────────────────────────────────────────
    // The hotspot is a plain <button>, positioned via JS to exactly cover
    // the SVG glow segment. Filtered ancestors (.bamboo-wrap's drop-shadow)
    // combined with pointer-events:none can break click hit-testing on
    // nested SVG in some mobile browsers, so we avoid relying on that path.
    function positionBambooHotspot() {
      const target  = document.querySelector('.glow-hit');
      const hotspot = document.getElementById('bambooHotspot');
      if (!target || !hotspot) return;
      const rect = target.getBoundingClientRect();
      hotspot.style.left   = rect.left + 'px';
      hotspot.style.top    = rect.top + 'px';
      hotspot.style.width  = rect.width + 'px';
      hotspot.style.height = rect.height + 'px';
    }
    window.addEventListener('resize', positionBambooHotspot);
    positionBambooHotspot();

    let bambooBubbleTimer = null;
    function onBambooGlowClick(e) {
      const bubble = document.getElementById('bambooBubble');
      const rect = e.currentTarget.getBoundingClientRect();
      bubble.style.left = (rect.left + rect.width / 2) + 'px';
      bubble.style.top  = rect.top + 'px';
      bubble.classList.add('show');
      clearTimeout(bambooBubbleTimer);
      bambooBubbleTimer = setTimeout(() => bubble.classList.remove('show'), 2200);
    }

    // ── sha-256 via Web Crypto ───────────────────────────────────────────
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ── content registry ─────────────────────────────────────────────────
    // Keys are SHA-256 hashes of the lowercased code.
    // To add a new code, compute: node -e "require('crypto').createHash('sha256').update('yourcode').digest('hex')"
    const CODES = {
      '342555289c792d3ce36ef04c1162d54b8c9f6f41eaa24d870e38e7f2e76e4d9d': {
        theme: 'kaguya',
      },
      '8b6445b5e21f1472b1e4b4403b0772a9c5cbdf324db228ae9e8e968edd1d2036': {
        theme: 'touhou',
      },
    };

    // ── unlocked codes: in-memory only, nothing persisted ─────────────────
    let unlocked = new Set();
    // Only the most recently entered code's theme is shown as the
    // background — entering a new code should switch the scene, not
    // stack it on top of a previous one.
    let activeTheme = null;

    function applyThemes() {
      document.body.className = activeTheme ? 'theme-' + activeTheme : '';
    }

    // ── submit ───────────────────────────────────────────────────────────
    async function submitCode() {
      const input = document.getElementById('codeInput');
      const msg   = document.getElementById('codeMsg');
      const raw   = input.value.trim();
      if (!raw) return;

      const hash = await sha256(raw.toLowerCase());

      if (CODES[hash]) {
        unlocked.add(hash);
        activeTheme = CODES[hash].theme;
        applyThemes();
        renderEntries();
        msg.className = 'code-msg';
        msg.textContent = '';
        input.value = '';
      } else {
        msg.className = 'code-msg';
        msg.textContent = 'invalid code.';
        input.classList.add('error');
        setTimeout(() => input.classList.remove('error'), 400);
      }
    }

    // ── render unlocked entries ──────────────────────────────────────────
    function renderEntries() {
      const container = document.getElementById('entries');
      const active    = [...unlocked].filter(h => CODES[h]?.content);

      if (active.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = active.map(h => {
        const e    = CODES[h];
        const meta = [
          e.tag  ? `<span class="tag">${e.tag}</span>` : '',
          e.date ? `<span>${e.date}</span>` : '',
        ].filter(Boolean).join('');
        return `<div class="entry">
          ${meta ? `<div class="entry-meta">${meta}</div>` : ''}
          ${e.title ? `<div class="entry-title">${e.title}</div>` : ''}
          <div class="entry-content">${e.content}</div>
        </div>`;
      }).join('');
    }

    document.getElementById('codeInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitCode();
    });

    // ── tsukimi countdown ─────────────────────────────────────────────────
    const TSUKIMI_TARGET = new Date(2026, 8, 25, 0, 0, 0);
    function updateCountdown() {
      const el = document.getElementById('countdownClock');
      const diff = TSUKIMI_TARGET - new Date();
      if (diff <= 0) { el.textContent = '00:00:00:00'; return; }
      const totalSeconds = Math.floor(diff / 1000);
      const days    = Math.floor(totalSeconds / 86400);
      const hours   = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const pad = n => String(n).padStart(2, '0');
      el.textContent = `${pad(days)}:${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ── exodia relic hunt ────────────────────────────────────────────────
    if (window.Jigsaw) {
      Jigsaw.createRelicHunt({
        field: document.getElementById('relicStage'),
        el: {
          modal:        document.getElementById('revealModal'),
          back:         document.getElementById('revealBack'),
          title:        document.getElementById('revealTitle'),
          grid:         document.getElementById('revealGrid'),
          progress:     document.getElementById('revealProgress'),
          nextBtn:      document.getElementById('revealNextBtn'),
          restartBtn:   document.getElementById('revealRestartBtn'),
          guessWrap:    document.getElementById('revealGuess'),
          guessInput:   document.getElementById('revealGuessInput'),
          guessBtn:     document.getElementById('revealGuessBtn'),
          hint:         document.getElementById('revealHint'),
          solvedNote:   document.getElementById('revealSolvedNote'),
        },
        howto: {
          openBtn:  document.getElementById('howtoBtn'),
          modal:    document.getElementById('howtoModal'),
          closeBtn: document.getElementById('howtoClose'),
        },
        storageKey: 'archive_touhou_relics_v1',
        rewardCode: '000',
        parts: [
          { key: 'head',     label: 'Head',       image: '../jigsaw/head.png',
            answerHash: 'dfe5b6fcfa43874b206b67ff0d6df26f39c6b923ac6868f04db113aef3904761', answerLength: 4 },
          { key: 'leftArm',  label: 'Left Arm',    image: '../jigsaw/left_arm.png',
            answerHash: 'f045b9ca8f63f35d8c8da4254d18f914ac5b2d47f87e763b3b2e435ad2f7373d', answerLength: 2 },
          { key: 'rightArm', label: 'Right Arm',   image: '../jigsaw/right_arm.jpeg',
            answerHash: '161e1fb0094a653b4f2ffaae9988be294e0a7adb612f0cef94fd619b64e886c3', answerLength: 3 },
          { key: 'leftLeg',  label: 'Left Leg',    image: '../jigsaw/left_leg.jpg',
            answerHash: '69bdaae2f6a215b745094455de3e6cecb5ec52fffe1cedaf98f42c9fa8c7f4e4', answerLength: 1 },
          { key: 'rightLeg', label: 'Right Leg',   image: '../jigsaw/right_leg.gif',
            answerHash: '60577f3b537744ead749e5793e5346210ecf52cea87f186ea7bcf6f45ab59e45', answerLength: 4 },
        ],
      });
    }

    applyThemes();
    renderEntries();
  </script>
