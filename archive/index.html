<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>archive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #0e0e12;
      color: #d4d4cc;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    .header {
      max-width: 560px;
      margin: 0 auto 48px;
    }
    .header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: #888;
    }
    .header h1 span { color: #c0392b; }

    /* ── code entry ─────────────────────────────────────── */
    .code-form {
      max-width: 560px;
      margin: 0 auto 56px;
    }
    .code-row {
      display: flex;
      gap: 8px;
    }
    .code-input {
      flex: 1;
      padding: 10px 14px;
      background: #1a1a22;
      border: 1px solid #2e2e3a;
      border-radius: 4px;
      color: #d4d4cc;
      font-size: 0.95rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.15s;
    }
    .code-input::placeholder { color: #444; }
    .code-input:focus { border-color: #555; }
    .code-input.error { border-color: #8b2020; animation: shake 0.25s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .code-btn {
      padding: 10px 20px;
      background: #1a1a22;
      border: 1px solid #2e2e3a;
      border-radius: 4px;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .code-btn:hover { background: #252530; color: #d4d4cc; }
    .code-msg {
      margin-top: 8px;
      font-size: 0.8rem;
      min-height: 1.2em;
      color: #8b2020;
    }
    .code-msg.ok { color: #4a8; }

    /* ── unlocked entries ───────────────────────────────── */
    .entries {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .entry {
      border-left: 2px solid #2e2e3a;
      padding-left: 20px;
    }
    .entry-meta {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }
    .entry-meta .tag {
      color: #c0392b;
      margin-right: 8px;
    }
    .entry-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e0e0d8;
      margin-bottom: 12px;
    }
    .entry-content {
      font-size: 0.9rem;
      line-height: 1.75;
      color: #b0b0a8;
    }
    .entry-content p + p { margin-top: 0.9em; }
    .entry-content img {
      max-width: 100%;
      border-radius: 4px;
      margin-top: 8px;
    }
    .entry-content a { color: #9bb; text-underline-offset: 3px; }

    .empty {
      max-width: 560px;
      margin: 0 auto;
      color: #333;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>つ<span>ば</span>き / archive</h1>
  </div>

  <div class="code-form">
    <div class="code-row">
      <input id="codeInput" class="code-input" type="text" placeholder="enter code" autocomplete="off" spellcheck="false">
      <button class="code-btn" onclick="submitCode()">unlock</button>
    </div>
    <div id="codeMsg" class="code-msg"></div>
  </div>

  <div id="entries" class="entries"></div>
  <div id="empty" class="empty" style="display:none">— nothing unlocked yet —</div>

  <script>
    // ── content registry ────────────────────────────────────────────────────
    // Add entries here. key = code (case-insensitive), value = entry object.
    // Fields: title (string), tag (string, optional), date (string, optional),
    //         content (HTML string).
    const CODES = {
      // example (remove before use):
      // 'sakura': {
      //   tag: 'letter',
      //   date: '2026-07-19',
      //   title: 'A note for you',
      //   content: `<p>...</p>`
      // },
    };

    // ── state ───────────────────────────────────────────────────────────────
    let unlocked = new Set();
    try {
      const saved = JSON.parse(localStorage.getItem('archive_unlocked') || '[]');
      saved.forEach(c => unlocked.add(c));
    } catch(e) {}

    // ── logic ────────────────────────────────────────────────────────────────
    function submitCode() {
      const input = document.getElementById('codeInput');
      const msg   = document.getElementById('codeMsg');
      const code  = input.value.trim().toLowerCase();
      if (!code) return;

      if (CODES[code]) {
        if (unlocked.has(code)) {
          msg.className = 'code-msg ok';
          msg.textContent = 'already unlocked.';
        } else {
          unlocked.add(code);
          try { localStorage.setItem('archive_unlocked', JSON.stringify([...unlocked])); } catch(e) {}
          msg.className = 'code-msg ok';
          msg.textContent = 'unlocked.';
          renderEntries();
        }
        input.value = '';
      } else {
        msg.className = 'code-msg';
        msg.textContent = 'invalid code.';
        input.classList.add('error');
        setTimeout(() => input.classList.remove('error'), 400);
      }
    }

    function renderEntries() {
      const container = document.getElementById('entries');
      const emptyEl   = document.getElementById('empty');
      const active = [...unlocked].filter(c => CODES[c]);

      if (active.length === 0) {
        container.innerHTML = '';
        emptyEl.style.display = '';
        return;
      }
      emptyEl.style.display = 'none';
      container.innerHTML = active.map(code => {
        const e = CODES[code];
        const meta = [
          e.tag  ? `<span class="tag">${e.tag}</span>` : '',
          e.date ? `<span>${e.date}</span>` : '',
        ].filter(Boolean).join('');
        return `
          <div class="entry">
            ${meta ? `<div class="entry-meta">${meta}</div>` : ''}
            <div class="entry-title">${e.title}</div>
            <div class="entry-content">${e.content}</div>
          </div>`;
      }).join('');
    }

    document.getElementById('codeInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitCode();
    });

    renderEntries();
  </script>
</body>
</html>
