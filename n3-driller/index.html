<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>つばき — N3 Driller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #f7f6f2;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    .container { width: 100%; max-width: 640px; }

    header {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #1a1a2e;
    }

    .header-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .header-row2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .title { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; }
    .title span { color: #c0392b; }

    .stats { display: flex; gap: 12px; font-size: 0.9rem; font-weight: 600; }
    .streak { color: #c0392b; }

    .btn-group { display: flex; gap: 4px; }

    .tab, .lvl-btn {
      padding: 5px 12px;
      border: 2px solid #1a1a2e;
      background: transparent;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
      transition: all 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      letter-spacing: 0.02em;
    }

    .tab.active { background: #1a1a2e; color: white; }

    .lvl-btn { border-color: #bbb; color: #999; }
    .lvl-btn.active { border-color: #1a1a2e; color: #1a1a2e; background: #e8e8e0; }
    .lvl-btn[data-lv="n5"].active { border-color: #2980b9; color: #2980b9; background: #eaf4fb; }
    .lvl-btn[data-lv="n4"].active { border-color: #8e44ad; color: #8e44ad; background: #f5eefb; }
    .lvl-btn[data-lv="n3"].active { border-color: #c0392b; color: #c0392b; background: #fef0f0; }

    .progress { height: 4px; background: #e0e0d8; border-radius: 2px; margin-bottom: 16px; }
    .progress-bar { height: 100%; background: #c0392b; border-radius: 2px; transition: width 0.3s; }

    .card {
      background: white;
      border: 2px solid #1a1a2e;
      border-radius: 4px;
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 16px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .word { font-size: 3rem; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
    .reading { font-size: 1rem; color: #666; }

    .lv-tag {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      border-radius: 3px;
      margin-bottom: 10px;
    }
    .lv-tag.n5 { background: #eaf4fb; color: #2980b9; }
    .lv-tag.n4 { background: #f5eefb; color: #8e44ad; }
    .lv-tag.n3 { background: #fef0f0; color: #c0392b; }

    .grammar-pattern { font-size: 0.8rem; color: #888; font-weight: 600; margin-bottom: 10px; }
    .grammar-sentence { font-size: 1.2rem; line-height: 2; }
    .blank { color: #c0392b; font-weight: 700; }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .choice {
      padding: 14px 12px;
      border: 2px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 0.95rem;
      text-align: left;
      transition: border-color 0.1s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-height: 56px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      line-height: 1.4;
    }
    .choice:active { background: #f5f5f5; }
    .choice:hover:not(:disabled) { border-color: #888; }
    .choice .num { font-weight: 700; color: #bbb; min-width: 16px; flex-shrink: 0; padding-top: 1px; }
    .choice.correct { border-color: #27ae60; background: #f0faf4; }
    .choice.correct .num { color: #27ae60; }
    .choice.wrong { border-color: #c0392b; background: #fef0f0; }
    .choice.wrong .num { color: #c0392b; }
    .choice:disabled { cursor: default; }

    .feedback {
      font-size: 0.88rem;
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 12px;
      line-height: 1.6;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct { background: #f0faf4; border: 1px solid #27ae60; color: #1a7a3c; }
    .feedback.wrong { background: #fef0f0; border: 1px solid #c0392b; color: #a93226; }

    .next-btn {
      width: 100%;
      padding: 16px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .next-btn.visible { display: block; }

    .hint { font-size: 0.75rem; color: #bbb; text-align: center; margin-top: 12px; }
    kbd { background: #eee; border: 1px solid #ccc; border-radius: 3px; padding: 1px 5px; font-size: 0.7rem; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #888;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    @media (max-width: 500px) {
      .choices { grid-template-columns: 1fr; }
      .word { font-size: 2.4rem; }
      .grammar-sentence { font-size: 1.05rem; }
      .hint { display: none; }
      .card { padding: 24px 16px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-row1">
      <div class="title">つ<span>ば</span>き</div>
      <div class="stats">

      </div>
    </div>
    <div class="header-row2">

        <button class="tab" id="tab-grammar" onclick="setMode('grammar')">文法</button>
      </div>
      <div class="btn-group">

        <button class="lvl-btn active" data-lv="n3" onclick="toggleLevel('n3')">N3</button>

  { s:'子供の頃、よく川で泳いだ（　）があります。', a:'こと', c:['こと','もの','はず','わけ'], p:'〜ことがある', e:'ことがある = "there are times when; I have experienced ~"', lv:'n3' },
  { s:'彼女が犯人に違い（　）。証拠がある。', a:'ない', c:['ない','ある','なかった','あった'], p:'〜に違いない', e:'に違いない = "must be; there\'s no doubt that"', lv:'n3' },
  { s:'彼は病気な（　）、学校へ行きました。', a:'のに', c:['のに','から','ので','けど'], p:'〜のに (contrast)', e:'のに = "even though; despite the fact that" (surprise/complaint)', lv:'n3' },
  { s:'頭が痛い（　）、病院へ行きます。', a:'ので', c:['ので','のに','から','し'], p:'〜ので (reason)', e:'ので = "because; since" (softer/more objective than から)', lv:'n3' },
  { s:'仕事が忙しい（　）、宿題もあるし、大変です。', a:'し', c:['し','から','ので','のに'], p:'〜し〜し', e:'〜し = "and also; what\'s more" (listing reasons or qualities)', lv:'n3' },
  { s:'子供の頃はよく公園で遊んだ（　）です。', a:'もの', c:['もの','こと','はず','わけ'], p:'〜ものだ (reminiscing)', e:'ものだ = "used to do; I remember that ~" (nostalgia)', lv:'n3' },
  { s:'この本は難しい。子供には読めない（　）だ。', a:'わけ', c:['わけ','こと','もの','はず'], p:'〜わけだ', e:'わけだ = "that\'s why; it naturally follows; no wonder"', lv:'n3' },
  { s:'この本は読めば読む（　）面白くなります。', a:'ほど', c:['ほど','より','だけ','ばかり'], p:'〜ば〜ほど', e:'ば〜ほど = "the more ~ the more ~"', lv:'n3' },
  { s:'5人（　）チケットがありません。', a:'しか', c:['しか','だけ','ばかり','のみ'], p:'〜しか〜ない', e:'しか〜ない = "only; nothing but ~" (with negative verb)', lv:'n3' },
  { s:'英語（　）でなく、日本語も話せます。', a:'だけ', c:['だけ','しか','ばかり','のみ'], p:'〜だけでなく', e:'だけでなく = "not only ~ but also ~"', lv:'n3' },
  { s:'失敗した（　）、あきらめるつもりはありません。', a:'からといって', c:['からといって','からには','ことから','ことに'], p:'〜からといって', e:'からといって = "just because ~, doesn\'t mean ~"', lv:'n3' },
  { s:'日本に来た（　）は、日本語をマスターしたい。', a:'からには', c:['からには','からといって','ことから','ためには'], p:'〜からには', e:'からには = "now that; since; given that ~" (strong commitment)', lv:'n3' },
  { s:'先生の（　）、試験に合格できました。', a:'おかげで', c:['おかげで','せいで','ために','によって'], p:'〜おかげで', e:'おかげで = "thanks to ~; because of ~ (positive outcome)"', lv:'n3' },
  { s:'電車が遅れた（　）、会議に遅刻した。', a:'せいで', c:['せいで','おかげで','ために','によって'], p:'〜せいで', e:'せいで = "because of ~ (negative outcome); to blame"', lv:'n3' },
  { s:'彼は忙しい（　）、手伝ってくれました。', a:'にもかかわらず', c:['にもかかわらず','のに','ながら','から'], p:'〜にもかかわらず', e:'にもかかわらず = "despite; in spite of; nevertheless"', lv:'n3' },
  { s:'安い（　）、品質がいいですね。', a:'わりに', c:['わりに','くせに','のに','ながら'], p:'〜わりに', e:'わりに = "for ~; considering ~; in proportion to"', lv:'n3' },
  { s:'もっと練習すれ（　）よかったのに。', a:'ば', c:['ば','たら','と','なら'], p:'〜ばよかった (regret)', e:'ばよかった = "I wish I had ~; should have ~"', lv:'n3' },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let mode = 'vocab';
let activeLevels = new Set(['n3']);
let score = 0, total = 0, streak = 0;
let answered = false, current = null;
let recentKeys = [];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function activeVocab() { return vocab.filter(v => activeLevels.has(v.lv)); }
function activeGrammar() { return grammar.filter(g => activeLevels.has(g.lv)); }

// ── GENERATORS ────────────────────────────────────────────────────────────────
function genVocab() {
  const pool = activeVocab();
  if (pool.length < 4) return null;

  let idx;
  let tries = 0;
  do {
    idx = Math.floor(Math.random() * pool.length);
    tries++;
  } while (recentKeys.includes('v' + idx) && tries < pool.length);

  recentKeys.push('v' + idx);
  if (recentKeys.length > 15) recentKeys.shift();

  const item = pool[idx];
  const wrong = shuffle(pool.filter((_, i) => i !== idx)).slice(0, 3).map(v => v.m);
  const choices = shuffle([item.m, ...wrong]);
  return { type: 'vocab', word: item.w, reading: item.r, answer: item.m, choices, lv: item.lv };
}

function genGrammar() {
  const pool = activeGrammar();
  if (pool.length === 0) return null;

  let idx;
  let tries = 0;
  do {
    idx = Math.floor(Math.random() * pool.length);
    tries++;
  } while (recentKeys.includes('g' + idx) && tries < pool.length);

  recentKeys.push('g' + idx);
  if (recentKeys.length > 15) recentKeys.shift();

  const item = pool[idx];
  const choices = shuffle(item.c);
  return { type: 'grammar', sentence: item.s, pattern: item.p, answer: item.a, choices, explanation: item.e, lv: item.lv };
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderQuestion() {
  const card = document.getElementById('question-card');
  const choicesEl = document.getElementById('choices-container');
  const fb = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');

  fb.className = 'feedback';
  nextBtn.classList.remove('visible');

  if (!current) {
    card.innerHTML = `<div class="empty-state">No questions available.<br>Select at least one level above.</div>`;
    choicesEl.innerHTML = '';
    return;
  }

  const lvTag = `<div class="lv-tag ${current.lv}">${current.lv.toUpperCase()}</div>`;

  if (current.type === 'vocab') {
    card.innerHTML = `${lvTag}<div class="word">${current.word}</div><div class="reading">${current.reading}</div>`;
  } else {
    const display = current.sentence.replace('（　）', '<span class="blank">（　）</span>');
    card.innerHTML = `${lvTag}<div class="grammar-pattern">${current.pattern}</div><div class="grammar-sentence">${display}</div>`;
  }

  choicesEl.innerHTML = current.choices.map((c, i) =>
    `<button class="choice" onclick="choose(${i})">
      <span class="num">${i + 1}</span><span>${c}</span>
    </button>`
  ).join('');
}

function updateStats() {
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  document.getElementById('score-display').textContent = `${score} / ${total}`;
  document.getElementById('streak-display').textContent = `🔥 ${streak}`;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ── INTERACTION ───────────────────────────────────────────────────────────────
function choose(idx) {
  if (answered || !current) return;
  answered = true;
  total++;

  const chosen = current.choices[idx];
  const correct = chosen === current.answer;
  if (correct) { score++; streak++; } else { streak = 0; }

  document.querySelectorAll('.choice').forEach((el, i) => {
    el.disabled = true;
    if (current.choices[i] === current.answer) el.classList.add('correct');
    else if (i === idx) el.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  if (correct) {
    fb.className = 'feedback correct show';
    fb.textContent = '✓ Correct!';
  } else {
    fb.className = 'feedback wrong show';
    fb.textContent = `✗ Wrong. ${current.explanation || 'Correct: ' + current.answer}`;
  }

  document.getElementById('next-btn').classList.add('visible');
  updateStats();
}

function nextQuestion() {
  answered = false;
  current = mode === 'vocab' ? genVocab() : genGrammar();
  renderQuestion();
}

function setMode(m) {
  mode = m;
  recentKeys = [];
  document.getElementById('tab-vocab').classList.toggle('active', m === 'vocab');
  document.getElementById('tab-grammar').classList.toggle('active', m === 'grammar');
  nextQuestion();
}

function toggleLevel(lv) {
  if (activeLevels.has(lv) && activeLevels.size === 1) return; // keep at least one
  if (activeLevels.has(lv)) activeLevels.delete(lv);
  else activeLevels.add(lv);

  document.querySelectorAll('.lvl-btn').forEach(btn => {
    btn.classList.toggle('active', activeLevels.has(btn.dataset.lv));
  });

  recentKeys = [];
  nextQuestion();
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['1','2','3','4'].includes(e.key)) {
    const i = parseInt(e.key) - 1;
    if (!answered && current && i < current.choices.length) choose(i);
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (answered) nextQuestion();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
nextQuestion();
</script>
