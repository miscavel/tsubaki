<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>つばき — N3 Driller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #f7f6f2;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    .container { width: 100%; max-width: 640px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #1a1a2e;
      flex-wrap: wrap;
      gap: 8px;
    }

    .title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.04em; }
    .title span { color: #c0392b; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tabs { display: flex; gap: 4px; }

    .tab {
      padding: 6px 14px;
      border: 2px solid #1a1a2e;
      background: transparent;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .tab.active { background: #1a1a2e; color: white; }

    .stats { display: flex; gap: 12px; font-size: 0.9rem; font-weight: 600; }
    .streak { color: #c0392b; }

    .progress { height: 4px; background: #e0e0d8; border-radius: 2px; margin-bottom: 16px; }
    .progress-bar { height: 100%; background: #c0392b; border-radius: 2px; transition: width 0.3s; }

    .card {
      background: white;
      border: 2px solid #1a1a2e;
      border-radius: 4px;
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 16px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .word { font-size: 3rem; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
    .reading { font-size: 1rem; color: #666; }

    .grammar-pattern {
      font-size: 0.75rem;
      color: #c0392b;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .grammar-sentence { font-size: 1.25rem; line-height: 2; }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .choice {
      padding: 14px 12px;
      border: 2px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 0.95rem;
      text-align: left;
      transition: border-color 0.1s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-height: 56px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      line-height: 1.4;
    }
    .choice:active { background: #f5f5f5; }
    .choice:hover:not(:disabled) { border-color: #888; }

    .choice .num { font-weight: 700; color: #bbb; min-width: 16px; flex-shrink: 0; padding-top: 1px; }

    .choice.correct { border-color: #27ae60; background: #f0faf4; }
    .choice.correct .num { color: #27ae60; }
    .choice.wrong { border-color: #c0392b; background: #fef0f0; }
    .choice.wrong .num { color: #c0392b; }
    .choice:disabled { cursor: default; }

    .feedback {
      font-size: 0.88rem;
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 12px;
      line-height: 1.6;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct { background: #f0faf4; border: 1px solid #27ae60; color: #1a7a3c; }
    .feedback.wrong { background: #fef0f0; border: 1px solid #c0392b; color: #a93226; }

    .next-btn {
      width: 100%;
      padding: 16px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .next-btn.visible { display: block; }

    .hint { font-size: 0.75rem; color: #bbb; text-align: center; margin-top: 12px; }
    kbd { background: #eee; border: 1px solid #ccc; border-radius: 3px; padding: 1px 5px; font-size: 0.7rem; }

    @media (max-width: 500px) {
      .choices { grid-template-columns: 1fr; }
      .word { font-size: 2.4rem; }
      .grammar-sentence { font-size: 1.1rem; }
      .hint { display: none; }
      .card { padding: 24px 16px; }
    }
  </style>
</head>

// ── STATE ────────────────────────────────────────────────────────────────────
let mode = 'vocab';
let score = 0;
let total = 0;
let streak = 0;
let answered = false;
let current = null;
let recentKeys = [];

// ── HELPERS ──────────────────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function pickRandom(arr, exclude = -1) {
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (i === exclude);
  return i;
}

// ── QUESTION GENERATORS ──────────────────────────────────────────────────────
function genVocab() {
  let idx;
  do { idx = Math.floor(Math.random() * vocab.length); }
  while (recentKeys.includes('v' + idx) && recentKeys.length < vocab.length);
  recentKeys.push('v' + idx);
  if (recentKeys.length > 12) recentKeys.shift();

  const item = vocab[idx];
  const wrong = shuffle(vocab.filter((_, i) => i !== idx)).slice(0, 3).map(v => v.m);
  const choices = shuffle([item.m, ...wrong]);
  return { type: 'vocab', word: item.w, reading: item.r, answer: item.m, choices };
}

function genGrammar() {
  let idx;
  do { idx = Math.floor(Math.random() * grammar.length); }
  while (recentKeys.includes('g' + idx) && recentKeys.length < grammar.length);
  recentKeys.push('g' + idx);
  if (recentKeys.length > 12) recentKeys.shift();

  const item = grammar[idx];
  const choices = shuffle(item.c);
  return { type: 'grammar', sentence: item.s, pattern: item.p, answer: item.a, choices, explanation: item.e };
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderQuestion() {
  const card = document.getElementById('question-card');
  const choicesEl = document.getElementById('choices-container');

  if (current.type === 'vocab') {
    card.innerHTML = `<div class="word">${current.word}</div><div class="reading">${current.reading}</div>`;
  } else {
    const display = current.sentence.replace('（　）',
      '<span class="blank">（　）</span>');
    card.innerHTML = `<div class="grammar-pattern">${current.pattern}</div><div class="grammar-sentence">${display}</div>`;
  }

  choicesEl.innerHTML = current.choices.map((c, i) =>
    `<button class="choice" onclick="choose(${i})">
      <span class="num">${i + 1}</span><span>${c}</span>
    </button>`
  ).join('');

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').classList.remove('visible');
}

function updateStats() {
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  document.getElementById('score-display').textContent = `${score} / ${total}`;
  document.getElementById('streak-display').textContent = `🔥 ${streak}`;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ── INTERACTION ──────────────────────────────────────────────────────────────
function choose(idx) {
  if (answered) return;
  answered = true;
  total++;

  const chosen = current.choices[idx];
  const correct = chosen === current.answer;

  if (correct) { score++; streak++; }
  else { streak = 0; }

  document.querySelectorAll('.choice').forEach((el, i) => {
    el.disabled = true;
    if (current.choices[i] === current.answer) el.classList.add('correct');
    else if (i === idx) el.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  if (correct) {
    fb.className = 'feedback correct show';
    fb.textContent = '✓ Correct!';
  } else {
    fb.className = 'feedback wrong show';
    fb.textContent = `✗ Wrong. ${current.explanation || 'Correct: ' + current.answer}`;
  }

  document.getElementById('next-btn').classList.add('visible');
  updateStats();
}

function nextQuestion() {
  answered = false;
  current = mode === 'vocab' ? genVocab() : genGrammar();
  renderQuestion();
}

function setMode(m) {
  mode = m;
  recentKeys = [];
  document.getElementById('tab-vocab').classList.toggle('active', m === 'vocab');
  document.getElementById('tab-grammar').classList.toggle('active', m === 'grammar');
  nextQuestion();
}

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['1','2','3','4'].includes(e.key)) {
    const i = parseInt(e.key) - 1;
    if (!answered && i < current.choices.length) choose(i);
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (answered) nextQuestion();
  }
});

// ── INIT ─────────────────────────────────────────────────────────────────────
nextQuestion();
