<html lang="en">

    header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #1a1a2e; }
    .header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header-row + .header-row { margin-top: 10px; }
    .title { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.04em; }
    .title span { color: #c0392b; }
    .stats { display: flex; gap: 12px; font-size: 0.9rem; font-weight: 600; }
    .streak { color: #c0392b; }
    .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .tab, .lvl-btn, .prio-btn {
      padding: 5px 11px; border: 2px solid #1a1a2e; background: transparent;
      cursor: pointer; font-size: 0.82rem; font-weight: 700;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .tab.active { background: #1a1a2e; color: white; }
    .lvl-btn { border-color: #ccc; color: #aaa; }
    .lvl-btn.active { border-color: #1a1a2e; color: #1a1a2e; background: #e8e8e0; }
    .lvl-btn[data-lv="n5"].active { border-color: #2980b9; color: #2980b9; background: #eaf4fb; }
    .lvl-btn[data-lv="n4"].active { border-color: #8e44ad; color: #8e44ad; background: #f5eefb; }
    .lvl-btn[data-lv="n3"].active { border-color: #c0392b; color: #c0392b; background: #fef0f0; }
    .prio-btn { border-color: #ccc; color: #aaa; }
    .prio-btn.active { border-color: #d4a017; color: #d4a017; background: #fdf8e8; }
    .progress { height: 4px; background: #e0e0d8; border-radius: 2px; margin-bottom: 16px; }
    .progress-bar { height: 100%; background: #c0392b; border-radius: 2px; transition: width 0.3s; }
    .card {
      background: white; border: 2px solid #1a1a2e; border-radius: 4px;
      padding: 32px 24px; text-align: center; margin-bottom: 16px;
      min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .badges { display: flex; gap: 6px; margin-bottom: 10px; }
    .lv-tag { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 3px; }
    .lv-tag.n5 { background: #eaf4fb; color: #2980b9; }
    .lv-tag.n4 { background: #f5eefb; color: #8e44ad; }
    .lv-tag.n3 { background: #fef0f0; color: #c0392b; }
    .prio-tag { font-size: 0.7rem; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: #fdf8e8; color: #d4a017; }
    .word { font-size: 3rem; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
    .reading { font-size: 1rem; color: #666; }
    .grammar-pattern { font-size: 0.8rem; color: #888; font-weight: 600; margin-bottom: 10px; }
    .grammar-sentence { font-size: 1.2rem; line-height: 2; }
    .blank { color: #c0392b; font-weight: 700; }
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .choice {
      padding: 14px 12px; border: 2px solid #ddd; border-radius: 4px; background: white;
      cursor: pointer; font-size: 0.95rem; text-align: left; display: flex; align-items: flex-start;
      gap: 10px; min-height: 56px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; line-height: 1.4;
    }
    .choice:active { background: #f5f5f5; }
    .choice:hover:not(:disabled) { border-color: #888; }
    .choice .num { font-weight: 700; color: #bbb; min-width: 16px; flex-shrink: 0; padding-top: 1px; }
    .choice.correct { border-color: #27ae60; background: #f0faf4; }
    .choice.correct .num { color: #27ae60; }
    .choice.wrong { border-color: #c0392b; background: #fef0f0; }
    .choice.wrong .num { color: #c0392b; }
    .choice:disabled { cursor: default; }
    .feedback { font-size: 0.9rem; padding: 12px 16px; border-radius: 4px; margin-bottom: 12px; line-height: 1.8; display: none; }
    .feedback small { font-size: 0.78rem; opacity: 0.85; }
    .feedback.show { display: block; }
    .feedback.correct { background: #f0faf4; border: 1px solid #27ae60; color: #1a7a3c; }
    .feedback.wrong { background: #fef0f0; border: 1px solid #c0392b; color: #a93226; }
    .next-btn {
      width: 100%; padding: 16px; background: #1a1a2e; color: white; border: none;
      border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; display: none;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .next-btn.visible { display: block; }
    .hint { font-size: 0.75rem; color: #bbb; text-align: center; margin-top: 12px; }
    kbd { background: #eee; border: 1px solid #ccc; border-radius: 3px; padding: 1px 5px; font-size: 0.7rem; }
    .empty-state { text-align: center; padding: 40px 20px; color: #888; font-size: 0.9rem; line-height: 1.8; }
    @media (max-width: 500px) {
      .choices { grid-template-columns: 1fr; }
      .word { font-size: 2.4rem; }
      .grammar-sentence { font-size: 1.05rem; }
      .hint { display: none; }
      .card { padding: 24px 16px; }
    }
  </style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────
let mode = 'vocab';
let activeLevels = new Set(['n3']);
let priorityOnly = false;
let score = 0, total = 0, streak = 0;
let answered = false, current = null;
let recentKeys = [];

// ── FILTERS ───────────────────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function activeVocab()   { return vocab.filter(v => activeLevels.has(v.lv) && (!priorityOnly || v.p)); }
function activeGrammar() { return grammar.filter(g => activeLevels.has(g.lv) && (!priorityOnly || g.pr)); }

// ── GENERATORS ────────────────────────────────────────────────────────────────
function genVocab() {
  const pool = activeVocab();
  if (pool.length < 4) return null;
  let idx, tries = 0;
  do { idx = Math.floor(Math.random() * pool.length); tries++; }
  while (recentKeys.includes('v'+idx) && tries < pool.length);
  recentKeys.push('v'+idx);
  if (recentKeys.length > 15) recentKeys.shift();
  const item = pool[idx];
  const wrong = shuffle(pool.filter((_,i) => i !== idx)).slice(0,3).map(v => v.m);
  return { type:'vocab', word:item.w, reading:item.r, answer:item.m, choices:shuffle([item.m,...wrong]), lv:item.lv, isPriority:item.p };
}

function genGrammar() {
  const pool = activeGrammar();
  if (!pool.length) return null;
  let idx, tries = 0;
  do { idx = Math.floor(Math.random() * pool.length); tries++; }
  while (recentKeys.includes('g'+idx) && tries < pool.length);
  recentKeys.push('g'+idx);
  if (recentKeys.length > 15) recentKeys.shift();
  const item = pool[idx];
  return { type:'grammar', sentence:item.s, pattern:item.p, answer:item.a, choices:shuffle(item.c), explanation:item.e, lv:item.lv, isPriority:item.pr };
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderQuestion() {
  const card = document.getElementById('question-card');
  const choicesEl = document.getElementById('choices-container');
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').classList.remove('visible');

  if (!current) {
    card.innerHTML = `<div class="empty-state">No questions match the current filters.<br>Try selecting more levels or turning off Priority.</div>`;
    choicesEl.innerHTML = '';
    return;
  }

  const lvTag = `<div class="lv-tag ${current.lv}">${current.lv.toUpperCase()}</div>`;
  const prioTag = current.isPriority ? `<div class="prio-tag">⭐ Priority</div>` : '';
  const badges = `<div class="badges">${lvTag}${prioTag}</div>`;

  if (current.type === 'vocab') {
    card.innerHTML = `${badges}<div class="word">${current.word}</div><div class="reading">${current.reading}</div>`;
  } else {
    const display = current.sentence.replace('（　）','<span class="blank">（　）</span>');
    card.innerHTML = `${badges}<div class="grammar-pattern">${current.pattern}</div><div class="grammar-sentence">${display}</div>`;
  }

  choicesEl.innerHTML = current.choices.map((c,i) =>
    `<button class="choice" onclick="choose(${i})"><span class="num">${i+1}</span><span>${c}</span></button>`
  ).join('');
}

function updateStats() {
  const pct = total > 0 ? Math.round((score/total)*100) : 0;
  document.getElementById('score-display').textContent = `${score} / ${total}`;
  document.getElementById('streak-display').textContent = `🔥 ${streak}`;
  document.getElementById('progress-bar').style.width = pct+'%';
}

// ── INTERACTION ───────────────────────────────────────────────────────────────
function choose(idx) {
  if (answered || !current) return;
  answered = true; total++;
  const correct = current.choices[idx] === current.answer;
  if (correct) { score++; streak++; } else { streak = 0; }
  document.querySelectorAll('.choice').forEach((el,i) => {
    el.disabled = true;
    if (current.choices[i] === current.answer) el.classList.add('correct');
    else if (i === idx) el.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  if (current.type === 'vocab') {
    const detail = `${current.word}【${current.reading}】= ${current.answer}`;
    if (correct) {
      fb.className = 'feedback correct show';
      fb.textContent = `✓ Correct! ${detail}`;
    } else {
      fb.className = 'feedback wrong show';
      fb.textContent = `✗ Wrong. ${detail}`;
    }
  } else {
    const filled = current.sentence.replace('（　）', `「${current.answer}」`);
    const explanation = current.explanation || '';
    if (correct) {
      fb.className = 'feedback correct show';
      fb.innerHTML = `✓ Correct! <br>${filled}<br><small>${explanation}</small>`;
    } else {
      fb.className = 'feedback wrong show';
      fb.innerHTML = `✗ Wrong. <br>${filled}<br><small>${explanation}</small>`;
    }
  }
  document.getElementById('next-btn').classList.add('visible');
  updateStats();
}

function nextQuestion() {
  answered = false;
  current = mode === 'vocab' ? genVocab() : genGrammar();
  renderQuestion();
}

function setMode(m) {
  mode = m; recentKeys = [];
  document.getElementById('tab-vocab').classList.toggle('active', m==='vocab');
  document.getElementById('tab-grammar').classList.toggle('active', m==='grammar');
  nextQuestion();
}

function toggleLevel(lv) {
  if (activeLevels.has(lv) && activeLevels.size === 1) return;
  activeLevels.has(lv) ? activeLevels.delete(lv) : activeLevels.add(lv);
  document.querySelectorAll('.lvl-btn').forEach(btn => btn.classList.toggle('active', activeLevels.has(btn.dataset.lv)));
  recentKeys = [];
  nextQuestion();
}

function togglePriority() {
  priorityOnly = !priorityOnly;
  document.getElementById('prio-btn').classList.toggle('active', priorityOnly);
  recentKeys = [];
  nextQuestion();
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['1','2','3','4'].includes(e.key)) {
    const i = parseInt(e.key)-1;
    if (!answered && current && i < current.choices.length) choose(i);
  }
  if (e.key===' '||e.key==='Enter') { e.preventDefault(); if (answered) nextQuestion(); }
});

nextQuestion();
</script>
</body>
</html>
